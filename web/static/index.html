<body class="m-0 p-0">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, createContext, useContext, useMemo, useRef } = React;

    // Theme Context for light/dark mode
    const ThemeContext = createContext();
    function ThemeProvider({ children }) {
      const [theme, setTheme] = useState('light');

      useEffect(() => {
        fetch('/api/config')
          .then(res => res.ok ? res.json() : null)
          .then(cfg => {
            const cfgTheme = (cfg && cfg.defaultTheme) ? String(cfg.defaultTheme).toLowerCase() : 'light';
            if (cfgTheme === 'dark' || cfgTheme === 'light') {
              setTheme(cfgTheme);
              return;
            }

            // If server config is unavailable/invalid, fall back to last user choice.
            try {
              const storedTheme = localStorage.getItem('eck-glance-theme');
              if (storedTheme === 'dark' || storedTheme === 'light') {
                setTheme(storedTheme);
              }
            } catch {}
          })
          .catch(() => {
            // Network failure fallback: use persisted value if present.
            try {
              const storedTheme = localStorage.getItem('eck-glance-theme');
              if (storedTheme === 'dark' || storedTheme === 'light') {
                setTheme(storedTheme);
              }
            } catch {}
          });
      }, []);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        try { localStorage.setItem('eck-glance-theme', theme); } catch {}
      }, [theme]);
      const toggleTheme = () => setTheme(t => t === 'light' ? 'dark' : 'light');
      return React.createElement(ThemeContext.Provider, { value: { theme, toggleTheme } }, children);
    }
    const useTheme = () => useContext(ThemeContext);

    // Utility functions
    const formatBytes = (bytes) => {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    };

    const getStatusColor = (status) => {
      if (!status) return 'gray';
      const lower = String(status).toLowerCase();
      if (lower === 'green' || lower === 'ready' || lower === 'running' || lower === 'active' || lower === 'normal' || lower === 'info' || lower === 'bound') return 'green';
      if (lower === 'yellow' || lower === 'pending' || lower === 'warning') return 'yellow';
      if (lower === 'red' || lower === 'failed' || lower === 'error' || lower === 'crashlooping') return 'red';
      return 'gray';
    };

    const unwrapOuterMarkdownFence = (text) => {
      const source = String(text || '').trim();
      const fencedMatch = source.match(/^```(?:markdown|md)?\s*\n([\s\S]*?)\n```$/i);
      if (fencedMatch) return fencedMatch[1];
      const tildeMatch = source.match(/^~~~(?:markdown|md)?\s*\n([\s\S]*?)\n~~~$/i);
      if (tildeMatch) return tildeMatch[1];
      return source;
    };

    const renderInlineMarkdownFallback = (text, keyPrefix = 'md-inline') => {
      const input = String(text || '');
      const tokens = input.split(/(`[^`]+`|\*\*[^*]+\*\*|\*[^*]+\*|\[[^\]]+\]\([^\)]+\))/g).filter(Boolean);
      return tokens.map((token, idx) => {
        if (token.startsWith('`') && token.endsWith('`')) {
          return <code key={`${keyPrefix}-${idx}`}>{token.slice(1, -1)}</code>;
        }
        if (token.startsWith('**') && token.endsWith('**')) {
          return <strong key={`${keyPrefix}-${idx}`}>{token.slice(2, -2)}</strong>;
        }
        if (token.startsWith('*') && token.endsWith('*') && token.length > 2) {
          return <em key={`${keyPrefix}-${idx}`}>{token.slice(1, -1)}</em>;
        }
        const linkMatch = token.match(/^\[([^\]]+)\]\(([^\)]+)\)$/);
        if (linkMatch) {
          return (
            <a key={`${keyPrefix}-${idx}`} href={linkMatch[2]} target="_blank" rel="noopener noreferrer">
              {linkMatch[1]}
            </a>
          );
        }
        return <React.Fragment key={`${keyPrefix}-${idx}`}>{token}</React.Fragment>;
      });
    };

    const renderMarkdownFallback = (source) => {
      const lines = String(source || '').replace(/\r\n/g, '\n').split('\n');
      const blocks = [];
      let paragraph = [];
      let listItems = [];
      let listType = null;
      let codeLines = [];
      let inCodeBlock = false;

      const flushParagraph = () => {
        if (paragraph.length > 0) {
          const text = paragraph.join(' ').trim();
          if (text) blocks.push({ type: 'p', text });
          paragraph = [];
        }
      };

      const flushList = () => {
        if (listItems.length > 0) {
          blocks.push({ type: listType || 'ul', items: [...listItems] });
          listItems = [];
          listType = null;
        }
      };

      const flushCode = () => {
        if (codeLines.length > 0) {
          blocks.push({ type: 'code', text: codeLines.join('\n') });
          codeLines = [];
        }
      };

      lines.forEach((line) => {
        if (line.trim().startsWith('```') || line.trim().startsWith('~~~')) {
          flushParagraph();
          flushList();
          if (inCodeBlock) {
            flushCode();
            inCodeBlock = false;
          } else {
            inCodeBlock = true;
          }
          return;
        }

        if (inCodeBlock) {
          codeLines.push(line);
          return;
        }

        const trimmed = line.trim();
        if (!trimmed) {
          flushParagraph();
          flushList();
          return;
        }

        if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) {
          flushParagraph();
          flushList();
          blocks.push({ type: 'hr' });
          return;
        }

        const headingMatch = trimmed.match(/^(#{1,4})\s+(.*)$/);
        if (headingMatch) {
          flushParagraph();
          flushList();
          blocks.push({ type: `h${headingMatch[1].length}`, text: headingMatch[2].trim() });
          return;
        }

        const quoteMatch = trimmed.match(/^>\s?(.*)$/);
        if (quoteMatch) {
          flushParagraph();
          flushList();
          blocks.push({ type: 'blockquote', text: quoteMatch[1] });
          return;
        }

        const ulMatch = trimmed.match(/^[-*]\s+(.*)$/);
        if (ulMatch) {
          flushParagraph();
          if (listType && listType !== 'ul') flushList();
          listType = 'ul';
          listItems.push(ulMatch[1]);
          return;
        }

        const olMatch = trimmed.match(/^\d+\.\s+(.*)$/);
        if (olMatch) {
          flushParagraph();
          if (listType && listType !== 'ol') flushList();
          listType = 'ol';
          listItems.push(olMatch[1]);
          return;
        }

        paragraph.push(trimmed);
      });

      flushParagraph();
      flushList();
      if (inCodeBlock) flushCode();

      return (
        <div className="markdown-content">
          {blocks.map((block, idx) => {
            if (block.type === 'p') return <p key={`md-${idx}`}>{renderInlineMarkdownFallback(block.text, `md-p-${idx}`)}</p>;
            if (block.type === 'ul') return <ul key={`md-${idx}`}>{block.items.map((item, itemIdx) => <li key={`md-li-${idx}-${itemIdx}`}>{renderInlineMarkdownFallback(item, `md-ul-${idx}-${itemIdx}`)}</li>)}</ul>;
            if (block.type === 'ol') return <ol key={`md-${idx}`}>{block.items.map((item, itemIdx) => <li key={`md-li-${idx}-${itemIdx}`}>{renderInlineMarkdownFallback(item, `md-ol-${idx}-${itemIdx}`)}</li>)}</ol>;
            if (block.type === 'code') return <pre key={`md-${idx}`}><code>{block.text}</code></pre>;
            if (block.type === 'blockquote') return <blockquote key={`md-${idx}`}>{renderInlineMarkdownFallback(block.text, `md-q-${idx}`)}</blockquote>;
            if (block.type === 'hr') return <hr key={`md-${idx}`} />;
            if (/^h[1-4]$/.test(block.type)) {
              const Tag = block.type;
              return <Tag key={`md-${idx}`}>{renderInlineMarkdownFallback(block.text, `md-h-${idx}`)}</Tag>;
            }
            return null;
          })}
        </div>
      );
    };

    const renderMarkdown = (markdownText) => {
      const source = unwrapOuterMarkdownFence(markdownText);
      if (!source.trim()) {
        return <div className="markdown-content"><p>No review content returned.</p></div>;
      }

      const markedLib = typeof marked !== 'undefined' ? marked : (typeof window !== 'undefined' ? window.marked : undefined);
      const purifier = typeof DOMPurify !== 'undefined' ? DOMPurify : (typeof window !== 'undefined' ? window.DOMPurify : undefined);

      if (!markedLib || typeof markedLib.parse !== 'function' || !purifier || typeof purifier.sanitize !== 'function') {
        return renderMarkdownFallback(source);
      }

      const rawHtml = markedLib.parse(source, {
        gfm: true,
        breaks: false,
      });
      const safeHtml = purifier.sanitize(rawHtml, {
        USE_PROFILES: { html: true },
      });

      return <div className="markdown-content" dangerouslySetInnerHTML={{ __html: safeHtml }} />;
    };

        home: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
        upload: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,

        check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,

        moon: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>,
        sun: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>,
      };
      return <span className={className}>{iconMap[name] || iconMap.package}</span>;
    };

    // Theme Toggle Component
    const ThemeToggle = () => {
      const { theme, toggleTheme } = useTheme();
      return (
        <div className="fixed top-4 right-4 z-50 theme-toggle">
          <button
            onClick={() => theme !== 'light' && toggleTheme()}
            className={theme === 'light' ? 'active' : ''}
            title="Light mode"
          >
            <Icon name="sun" size={16} />
          </button>
          <button
            onClick={() => theme !== 'dark' && toggleTheme()}
            className={theme === 'dark' ? 'active' : ''}
            title="Dark mode"
          >
            <Icon name="moon" size={16} />
          </button>
        </div>

        displayStatus = status.health || status.phase || status.status || JSON.stringify(status);
      }
      displayStatus = String(displayStatus || 'unknown');
      // Map "Normal" to "Info" for events display
      const label = displayStatus === 'Normal' ? 'Info' : displayStatus;
      const color = getStatusColor(displayStatus);
      const colorClass = {
        green: 'status-green',

      }[color];
      return <span className={`status-badge ${colorClass}`}>{label}</span>;

    // SmartJSON Component - renders JSON intelligently
    const SmartJSON = ({ value, indent = 0, maxDepth = 15 }) => {
      if (indent > maxDepth) return <span className="json-string">"..."</span>;
      if (value === null || value === undefined) {
        return <span className="json-null">null</span>;
      }
      if (typeof value === 'boolean') {
        return <span className="json-boolean">{String(value)}</span>;
      }
      if (typeof value === 'number') {
        return <span className="json-number">{String(value)}</span>;
      }
      if (typeof value === 'string') {
        // Try to parse as JSON if it looks like JSON
        if ((value.startsWith('{') || value.startsWith('[')) && value.length > 2) {
          try {
            const parsed = JSON.parse(value);
            if (typeof parsed === 'object' && parsed !== null) {
              return <SmartJSON value={parsed} indent={indent} maxDepth={maxDepth} />;
            }
          } catch (e) { /* not JSON */ }
        }
        // Truncate very long strings
        const display = value.length > 500 ? value.substring(0, 500) + '...' : value;
        return <span className="json-string">{'"'}{display}{'"'}</span>;
      }
      if (Array.isArray(value)) {
        if (value.length === 0) return <span>{'[]'}</span>;
        return (
          <div style={{marginLeft: indent > 0 ? 16 : 0}}>
            <span>{'['}</span>
            {value.map((item, i) => (
              <div key={i} style={{marginLeft: 16}}>
                <SmartJSON value={item} indent={indent + 1} maxDepth={maxDepth} />
                {i < value.length - 1 ? ',' : ''}
              </div>
            ))}
            <span>{']'}</span>
          </div>
        );
      }
      if (typeof value === 'object') {
        const keys = Object.keys(value);
        if (keys.length === 0) return <span>{'{}'}</span>;
        return (
          <div style={{marginLeft: indent > 0 ? 16 : 0}}>
            <span>{'{'}</span>
            {keys.map((key, i) => (
              <div key={key} style={{marginLeft: 16}}>
                <span className="json-key">{'"'}{key}{'"'}</span>
                <span>{': '}</span>
                <SmartJSON value={value[key]} indent={indent + 1} maxDepth={maxDepth} />
                {i < keys.length - 1 ? ',' : ''}
              </div>
            ))}
            <span>{'}'}</span>
          </div>
        );
      }
      return <span>{String(value)}</span>;
    };

    // Custom Router
    const RouterContext = createContext({ path: '/', params: {}, navigate: () => {} });

    function matchRoute(pattern, path) {
      // Strip query params from path before matching
      const cleanPath = path.split('?')[0];
      const patternParts = pattern.split('/').filter(Boolean);
      const pathParts = cleanPath.split('/').filter(Boolean);
      if (patternParts.length !== pathParts.length) return null;
      const params = {};
      for (let i = 0; i < patternParts.length; i++) {
        if (patternParts[i].startsWith(':')) {
          params[patternParts[i].slice(1)] = decodeURIComponent(pathParts[i]);
        } else if (patternParts[i] !== pathParts[i]) {
          return null;
        }
      }
      return params;
    }

    function parseQueryString(search) {
      const params = {};
      if (!search) return params;
      const pairs = search.substring(1).split('&');
      pairs.forEach(pair => {
        const [key, value] = pair.split('=');
        params[decodeURIComponent(key)] = decodeURIComponent(value || '');
      });
      return params;
    }

    function HashRouter({ children }) {
      const [path, setPath] = useState(() => window.location.hash.slice(1) || '/');
      useEffect(() => {
        const onHash = () => setPath(window.location.hash.slice(1) || '/');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      const navigate = useCallback((to, { replace } = {}) => {
        if (replace) window.location.replace('#' + to);
        else window.location.hash = to;
      }, []);
      return <RouterContext.Provider value={{ path, params: {}, navigate }}>{children}</RouterContext.Provider>;
    }

    function Routes({ children }) {
      const { path, navigate } = useContext(RouterContext);
      const routes = React.Children.toArray(children);
      for (const route of routes) {
        const pattern = route.props.path;
        if (pattern === '*') return <RouterContext.Provider value={{ path, params: {}, navigate }}>{route.props.element}</RouterContext.Provider>;
        const params = matchRoute(pattern, path);
        if (params !== null) return <RouterContext.Provider value={{ path, params, navigate }}>{route.props.element}</RouterContext.Provider>;
      }
      return null;
    }

    function Route() { return null; }
    function Link({ to, children, className, ...props }) { return <a href={'#' + to} className={className} {...props}>{children}</a>; }
    function Navigate({ to, replace }) { const { navigate } = useContext(RouterContext); useEffect(() => { navigate(to, { replace }); }, []); return null; }
    function useParams() { return useContext(RouterContext).params; }
    function useNavigate() { return useContext(RouterContext).navigate; }
    function useLocation() { const { path } = useContext(RouterContext); return { pathname: path, hash: '', search: '' }; }
    const BrowserRouter = HashRouter;

        return { text, totalLines, hasMore, returnedLines };

      constructor(props) {
        super(props);

        return { hasError: true, error };
      }
      componentDidCatch(error, info) {
        console.error('ECK Glance Error:', error, info);

      render() {

                </pre>
                <button
                  className="mt-4 px-4 py-2 bg-brand-600 text-white rounded hover:bg-brand-700"

                    <div className="flex items-start justify-between mb-2">
                      <h4 className="font-bold text-blue-900">{insight.category || 'Info'}</h4>
                      <span className={`${severityStyles.info.badge} text-xs font-semibold px-2 py-1 rounded`}>
                        Info
                      </span>
                    </div>
                    <p className="text-sm text-blue-800 mb-2">{insight.message || insight.detail || ''}</p>
                    {(insight.namespace || insight.resource) && (
                      <div className="text-xs text-blue-700">
                        <span className="font-semibold">Location:</span> {insight.namespace && `${insight.namespace}`}{insight.resource && `/${insight.resource}`}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Legacy Errors as Info Items */}
          {legacyErrors.length > 0 && (
            <div className="mb-6">
              <h3 className="text-sm font-semibold text-blue-700 mb-3">Legacy Diagnostic Notes</h3>
              <ul className="space-y-2 text-sm text-blue-900">
                {legacyErrors.map((err, i) => (
                  <li key={i} className="flex gap-2">
                    <span className="text-blue-400">•</span>
                    <span>{err}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}

          {/* Diagnostic Log Section */}
          {diagnosticLog.length > 0 && (
            <div className="border-t pt-4">
              <button
                onClick={() => setLogExpanded(!logExpanded)}
                className="w-full text-left py-3 px-4 bg-gray-100 hover:bg-gray-200 rounded flex items-center justify-between font-semibold text-gray-700 transition"
              >
                <span className="flex items-center gap-2">
                  <Icon name={logExpanded ? 'chevron-down' : 'chevron-right'} size={18} />
                  Diagnostic Log
                </span>
                <span className="text-xs text-gray-500">{diagnosticLog.length} lines</span>
              </button>
              {logExpanded && (
                <div className="mt-4 bg-gray-900 text-gray-100 p-4 rounded font-mono text-xs overflow-x-auto max-h-96 overflow-y-auto">
                  {diagnosticLog.map((line, i) => (
                    <div key={i} className="whitespace-pre-wrap break-words">
                      <span className="text-gray-500 mr-3" style={{ minWidth: '2rem' }}>
                        {String(i + 1).padStart(3, '0')}
                      </span>
                      {line}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

            </h2>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <div className="text-sm text-gray-600">Version</div>
                <div className="text-lg font-semibold">{overview.version || 'Unknown'}</div>
              </div>
              <div>
                <div className="text-sm text-gray-600">Diagnostic Version</div>
                <div className="text-lg font-semibold">{overview.diagnosticVersion || 'Unknown'}</div>
              </div>
              <div>
                <div className="text-sm text-gray-600">Collected</div>
                <div className="text-lg font-semibold">{overview.collected || 'Unknown'}</div>
              </div>
              <div>
                <div className="text-sm text-gray-600">Nodes</div>
                <div className="text-lg font-semibold">{overview.nodes?.ready || 0}/{overview.nodes?.total || 0}</div>
              </div>
            </div>
          </div>

          {/* ECK Resources Section */}
          <div className="card p-6 mb-8">
            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
              <Icon name="zap" size={24} />
              ECK Resources
            </h2>
            <div className="space-y-4">
              {Object.entries(overview.health || {}).map(([ns, health]) => (
                <div key={ns} className="border-t pt-4 first:border-t-0 first:pt-0">
                  <h3 className="font-semibold text-gray-700 mb-3">{ns}</h3>
                  <div className="grid grid-cols-4 gap-4">
                    {health.eckResources && health.eckResources.map(res => (
                      <Link
                        key={`${res.type}-${res.name}`}
                        to={`/bundle/${bundleId}/ns/${ns}/${res.type}/${res.name}`}
                        className="p-3 border rounded cursor-pointer hover:bg-gray-50 block no-underline"
                        style={{color: 'inherit', textDecoration: 'none'}}
                      >
                        <div className="text-xs font-semibold text-brand-700 mb-1">{res.type}</div>
                        <div className="font-semibold text-sm truncate">
                          {res.name}
                          {res.version && <span className="text-xs font-normal ml-1" style={{color: 'var(--text-secondary)'}}>({res.version})</span>}
                        </div>
                        <StatusBadge status={res.health || res.phase || 'unknown'} />
                      </Link>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Pod Status by Owner */}
          <div className="card p-6 mb-8">

                              className="text-sm font-semibold text-brand-700 hover:underline"

                              {group.ownerType}: {group.owner}

                            <span className="text-xs text-gray-500">{group.ready}/{group.total} ready</span>
                          </div>
                          <div className="w-full bg-gray-200 rounded-full h-2 mb-2">
                            <div
                              className={`h-2 rounded-full ${group.ready === group.total ? 'bg-green-500' : group.ready > 0 ? 'bg-yellow-500' : 'bg-red-500'}`}
                              style={{ width: `${group.total ? (group.ready / group.total) * 100 : 0}%` }}

          </div>

          {/* Events Section */}
          <div className="card p-6 mb-8">
            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
              <Icon name="info" size={24} />
              Events Summary
            </h2>
            <div className="grid grid-cols-3 gap-4">
              <div className="p-4 bg-gray-50 rounded cursor-pointer hover:bg-gray-100"
                onClick={() => navigate(`/bundle/${bundleId}/events`)}
              >
                <div className="text-sm text-gray-600">Total Events</div>
                <div className="text-2xl font-bold">{healthCounts.total}</div>
              </div>
              <div className="p-4 bg-yellow-50 rounded cursor-pointer hover:bg-yellow-100"
                onClick={() => navigate(`/bundle/${bundleId}/events?type=Warning`)}
              >
                <div className="text-sm text-yellow-700">Warnings</div>
                <div className="text-2xl font-bold text-yellow-700">{healthCounts.warning}</div>
              </div>
              <div className="p-4 bg-red-50 rounded cursor-pointer hover:bg-red-100"
                onClick={() => navigate(`/bundle/${bundleId}/events?type=Error`)}
              >
                <div className="text-sm text-red-700">Errors</div>
                <div className="text-2xl font-bold text-red-700">{healthCounts.error}</div>
              </div>
            </div>
          </div>

          {/* Diagnostic Notes */}
          {(overview.diagnosticInsights?.length > 0 || overview.errors?.length > 0 || overview.diagnosticLog?.length > 0) && (
            <DiagnosticNotesSection overview={overview} />
          )}
        </div>
      );
    }

    // Resource List Page
    function ResourceListPage() {
      const { bundleId, ns, type } = useParams();
      const [resources, setResources] = useState([]);
      const [visibleCount, setVisibleCount] = useState(0);
      const [loading, setLoading] = useState(true);
      const navigate = useNavigate();

      useEffect(() => {
        let cancelled = false;
        setLoading(true);
        setResources([]);
        setVisibleCount(0);

        api.getResourceList(bundleId, ns, type)
          .then(items => {
            if (cancelled) return;
            const list = Array.isArray(items) ? items : [];
            setResources(list);
            setVisibleCount(Math.min(100, list.length));
          })
          .finally(() => {
            if (!cancelled) setLoading(false);
          });

        return () => {
          cancelled = true;
        };
      }, [bundleId, ns, type]);

      useEffect(() => {
        if (!resources.length || visibleCount >= resources.length) return;
        const timer = setTimeout(() => {
          setVisibleCount(v => Math.min(v + 200, resources.length));
        }, 30);
        return () => clearTimeout(timer);
      }, [resources, visibleCount]);

      if (loading) {
        return <div className="main-content p-8">Loading {type}...</div>;
      }

      const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
      const visibleResources = resources.slice(0, visibleCount || resources.length);

      // Helper: status color dot
      const StatusDot = ({ color }) => (
        <span style={{
          display: 'inline-block', width: 8, height: 8, borderRadius: '50%',
          backgroundColor: color, marginRight: 6, flexShrink: 0
        }} />
      );

      // Helper: small badge/chip
      const Chip = ({ children, color, onClick }) => (
        <span
          onClick={onClick}
          style={{
            display: 'inline-flex', alignItems: 'center', padding: '2px 8px',
            borderRadius: 12, fontSize: 11, fontWeight: 500, lineHeight: '18px',
            backgroundColor: color || 'var(--bg-secondary)',
            color: color ? '#fff' : 'var(--text-secondary)',
            cursor: onClick ? 'pointer' : 'default',
            marginRight: 4, marginBottom: 2,
          }}
        >
          {children}
        </span>
      );

      // Helper: linked resource chip
      const ResourceLink = ({ kind, name, resourceType }) => (
        <Chip
          color="var(--teal)"
          onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${resourceType}/${name}`); }}
        >
          {kind}: {name}
        </Chip>
      );

      // Workload replica bar
      const ReplicaBar = ({ status }) => {
        if (!status) return null;
        const { desired, ready } = status;
        const pct = desired > 0 ? (ready / desired) * 100 : 0;
        const color = ready >= desired ? '#10b981' : ready > 0 ? '#f59e0b' : '#ef4444';
        return (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ flex: 1, height: 6, backgroundColor: 'var(--bg-secondary)', borderRadius: 3, overflow: 'hidden', maxWidth: 80 }}>
              <div style={{ width: `${pct}%`, height: '100%', backgroundColor: color, borderRadius: 3, transition: 'width 0.3s' }} />
            </div>
            <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{ready}/{desired}</span>
          </div>
        );
      };

      // Workload status text
      const getWorkloadStatus = (item) => {
        const rs = item._replicaStatus;
        if (!rs) return { text: 'Unknown', color: '#6b7280' };
        if (rs.ready >= rs.desired && rs.desired > 0) return { text: 'Ready', color: '#10b981' };
        if (rs.ready > 0) return { text: 'Degraded', color: '#f59e0b' };
        if (rs.desired === 0) return { text: 'Scaled to 0', color: '#6b7280' };
        return { text: 'Not Ready', color: '#ef4444' };
      };

      // Pod status color
      const getPodStatusColor = (phase) => {
        switch (phase) {
          case 'Running': return '#10b981';
          case 'Succeeded': return '#10b981';
          case 'Pending': return '#f59e0b';
          case 'Failed': return '#ef4444';
          default: return '#6b7280';
        }
      };

      // Render workload cards (statefulsets, deployments, daemonsets)
      const renderWorkloadCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const age = item.metadata?.creationTimestamp ? new Date(item.metadata.creationTimestamp).toLocaleDateString() : '';
        const ws = getWorkloadStatus(item);
        const crd = item._crdOwner;
        const nodeSet = item._nodeSet;

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/ns/${ns}/${type}/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0, flex: 1 }}>
                <StatusDot color={ws.color} />
                <span style={{ fontWeight: 600, fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{name}</span>
                {crd && (
                  <Chip color="#6366f1" onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${crd.type}/${crd.name}`); }}>
                    {crd.kind}: {crd.name}
                  </Chip>
                )}
                {nodeSet && <Chip>{`nodeSet: ${nodeSet}`}</Chip>}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <ReplicaBar status={item._replicaStatus} />
                <span style={{ fontSize: 12, color: 'var(--text-secondary)', whiteSpace: 'nowrap' }}>{age}</span>
              </div>
            </div>
          </div>
        );
      };

      // Render pod cards
      const renderPodCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const phase = item.status?.phase || 'Unknown';
        const age = item.metadata?.creationTimestamp ? new Date(item.metadata.creationTimestamp).toLocaleDateString() : '';
        const ready = item.status?.containerStatuses?.filter(c => c.ready).length || 0;
        const total = item.status?.containerStatuses?.length || 0;
        const restarts = item.status?.containerStatuses?.reduce((s, c) => s + (c.restartCount || 0), 0) || 0;
        const node = item.spec?.nodeName || '';
        const workload = item._owningWorkload;
        const crd = item._crdOwner;
        const nodeSet = item._nodeSet;

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/ns/${ns}/pods/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0, flex: 1, flexWrap: 'wrap' }}>
                <StatusDot color={getPodStatusColor(phase)} />
                <span style={{ fontWeight: 600, fontSize: 14 }}>{name}</span>
                {workload && (
                  <Chip color="#8b5cf6" onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${workload.type}/${workload.name}`); }}>
                    {workload.kind}: {workload.name}
                  </Chip>
                )}
                {crd && (
                  <Chip color="#6366f1" onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${crd.type}/${crd.name}`); }}>
                    {crd.kind}: {crd.name}
                  </Chip>
                )}
                {nodeSet && <Chip>{`nodeSet: ${nodeSet}`}</Chip>}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
                <span style={{ fontSize: 12, padding: '2px 6px', borderRadius: 4, backgroundColor: getPodStatusColor(phase) + '20', color: getPodStatusColor(phase), fontWeight: 500 }}>{phase}</span>
                <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Ready: {ready}/{total}</span>
                {restarts > 0 && <span style={{ fontSize: 12, color: '#f59e0b' }}>Restarts: {restarts}</span>}
                {node && <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{node}</span>}
                <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{age}</span>
              </div>
            </div>
          </div>
        );
      };

      // Render configmap cards
      const renderConfigMapCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const age = item.metadata?.creationTimestamp ? new Date(item.metadata.creationTimestamp).toLocaleDateString() : '';
        const keys = Object.keys(item.data || {});
        const usedBy = item._usedBy || [];

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/ns/${ns}/configmaps/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: usedBy.length > 0 ? 6 : 0 }}>
                  <span style={{ fontWeight: 600, fontSize: 14 }}>{name}</span>
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{keys.length} key{keys.length !== 1 ? 's' : ''}</span>
                </div>
                {usedBy.length > 0 && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 11, color: 'var(--text-secondary)', marginRight: 4 }}>Used by:</span>
                    {usedBy.map((ref, j) => (
                      <Chip key={j} color="#0ea5e9" onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${ref.type}/${ref.name}`); }}>
                        {ref.kind}: {ref.name}
                      </Chip>
                    ))}
                  </div>
                )}
              </div>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)', flexShrink: 0 }}>{age}</span>
            </div>
          </div>
        );
      };

      // Render secret cards
      const renderSecretCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const age = item.metadata?.creationTimestamp ? new Date(item.metadata.creationTimestamp).toLocaleDateString() : '';
        const secretType = item.type || 'Opaque';
        const keys = Object.keys(item.data || item.stringData || {});
        const usedBy = item._usedBy || [];
        const isTLS = item._isTLS;
        const certPurpose = item._certPurpose;
        const certInfo = item._certificateInfo || item.certificateInfo;

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/ns/${ns}/secrets/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: (usedBy.length > 0 || certInfo) ? 6 : 0, flexWrap: 'wrap' }}>
                  <span style={{ fontWeight: 600, fontSize: 14 }}>{name}</span>
                  <Chip>{secretType}</Chip>
                  {isTLS && <Chip color="#f59e0b">TLS</Chip>}
                  {certPurpose && <Chip>{certPurpose}</Chip>}
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{keys.length} key{keys.length !== 1 ? 's' : ''}</span>
                </div>
                {certInfo && certInfo.not_after && (
                  <div style={{ fontSize: 12, color: new Date(certInfo.not_after) < new Date() ? '#ef4444' : 'var(--text-secondary)', marginBottom: usedBy.length > 0 ? 4 : 0 }}>
                    Expires: {new Date(certInfo.not_after).toLocaleDateString()}
                    {certInfo.sans && certInfo.sans.length > 0 && ` | SANs: ${certInfo.sans.slice(0, 3).join(', ')}${certInfo.sans.length > 3 ? ` +${certInfo.sans.length - 3}` : ''}`}
                  </div>
                )}
                {usedBy.length > 0 && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 11, color: 'var(--text-secondary)', marginRight: 4 }}>Used by:</span>
                    {usedBy.map((ref, j) => (
                      <Chip key={j} color="#0ea5e9" onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${ref.type}/${ref.name}`); }}>
                        {ref.kind}: {ref.name}
                      </Chip>
                    ))}
                  </div>
                )}
              </div>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)', flexShrink: 0 }}>{age}</span>
            </div>
          </div>
        );
      };

      // Render service cards
      const renderServiceCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const age = item.metadata?.creationTimestamp ? new Date(item.metadata.creationTimestamp).toLocaleDateString() : '';
        const svcType = item.spec?.type || 'ClusterIP';
        const clusterIP = item.spec?.clusterIP || '';
        const ports = item.spec?.ports?.map(p => `${p.port}${p.targetPort ? ':' + p.targetPort : ''}/${p.protocol || 'TCP'}`).join(', ') || '';
        const hasEndpoints = item._endpoints && item._endpoints.subsets && item._endpoints.subsets.length > 0;
        const endpointCount = hasEndpoints ? item._endpoints.subsets.reduce((s, sub) => s + (sub.addresses || []).length, 0) : 0;
        const policies = item._networkPolicies || [];
        const usedBy = item._usedBy || [];

        const typeColors = { LoadBalancer: '#6366f1', NodePort: '#8b5cf6', ClusterIP: '#6b7280', ExternalName: '#0ea5e9' };

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/ns/${ns}/services/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4, flexWrap: 'wrap' }}>
                  <StatusDot color={hasEndpoints ? '#10b981' : '#f59e0b'} />
                  <span style={{ fontWeight: 600, fontSize: 14 }}>{name}</span>
                  <Chip color={typeColors[svcType] || '#6b7280'}>{svcType}</Chip>
                  {policies.length > 0 && <Chip color="#f59e0b">NetworkPolicy</Chip>}
                  {usedBy.map((u, j) => (
                    <Chip key={j} color={u.kind === 'Elasticsearch' || u.kind === 'Kibana' ? '#6366f1' : '#8b5cf6'}
                      onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${u.type}/${u.name}`); }}>
                      {u.kind}: {u.name}
                    </Chip>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', display: 'flex', gap: 16, flexWrap: 'wrap' }}>
                  {clusterIP && clusterIP !== 'None' && <span>IP: {clusterIP}</span>}
                  {ports && <span>Ports: {ports}</span>}
                  <span>Endpoints: {endpointCount}</span>
                  {item.status?.loadBalancer?.ingress?.length > 0 && (
                    <span style={{ fontSize: 12, padding: '2px 8px', borderRadius: 4, backgroundColor: '#dbeafe', color: '#1d4ed8' }}>
                      ExtIP: {item.status.loadBalancer.ingress.map(i => i.ip || i.hostname).join(', ')}
                    </span>
                  )}
                </div>
              </div>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)', flexShrink: 0 }}>{age}</span>
            </div>
          </div>
        );
      };

      // Render endpoint cards
      const renderEndpointCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const addresses = item._addresses || [];
        const ports = item._ports || [];
        const service = item._service;
        const usedBy = item._usedBy || [];
        const totalAddrs = addresses.length;

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/ns/${ns}/endpoints/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0, flex: 1, flexWrap: 'wrap' }}>
                <StatusDot color={totalAddrs > 0 ? '#22c55e' : '#ef4444'} />
                <span style={{ fontWeight: 600, fontSize: 14 }}>{name}</span>
                {service && (
                  <Chip color="#0ea5e9" onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/services/${service.name}`); }}>
                    Svc: {service.name}
                  </Chip>
                )}
                {usedBy.map((u, j) => (
                  <Chip key={j} color={u.kind === 'Elasticsearch' || u.kind === 'Kibana' ? '#6366f1' : '#8b5cf6'}
                    onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${u.type}/${u.name}`); }}>
                    {u.kind}: {u.name}
                  </Chip>
                ))}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 12, color: 'var(--text-secondary)', whiteSpace: 'nowrap' }}>
                {totalAddrs > 0 && <span>{totalAddrs} address{totalAddrs !== 1 ? 'es' : ''}</span>}
                {ports.length > 0 && <span>{ports.map(p => `${p.port}/${p.protocol}`).join(', ')}</span>}
              </div>
            </div>
            {addresses.length > 0 && (
              <div style={{ marginTop: 6, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {addresses.slice(0, 5).map((a, j) => (
                  <span key={j} style={{ fontSize: 11, padding: '2px 6px', borderRadius: 4, backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-secondary)' }}>
                    {a.ip}{a.pod ? ` → ${a.pod}` : ''}
                  </span>
                ))}
                {addresses.length > 5 && <span style={{ fontSize: 11, color: 'var(--text-secondary)' }}>+{addresses.length - 5} more</span>}
              </div>
            )}
          </div>
        );
      };

      // Render PVC cards
      const renderPVCCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const age = item.metadata?.creationTimestamp ? new Date(item.metadata.creationTimestamp).toLocaleDateString() : '';
        const phase = item.status?.phase || 'Pending';
        const storageClass = item.spec?.storageClassName || '-';
        const capacity = item.status?.capacity?.storage || item.spec?.resources?.requests?.storage || '-';
        const accessModes = item.spec?.accessModes || [];
        const volumeName = item.spec?.volumeName;
        const usedBy = item._usedBy || [];

        const phaseColor = phase === 'Bound' ? '#10b981' : phase === 'Pending' ? '#f59e0b' : '#ef4444';

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/ns/${ns}/persistentvolumeclaims/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4, flexWrap: 'wrap' }}>
                  <StatusDot color={phaseColor} />
                  <span style={{ fontWeight: 600, fontSize: 14 }}>{name}</span>
                  <Chip color={phaseColor}>{phase}</Chip>
                  {volumeName && (
                    <Chip color="#0ea5e9" onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/persistentvolumes/${volumeName}`); }}>
                      PV: {volumeName}
                    </Chip>
                  )}
                  {usedBy.map((u, j) => (
                    <Chip key={j} color={u.kind === 'Elasticsearch' || u.kind === 'Kibana' ? '#6366f1' : '#8b5cf6'}
                      onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${u.type}/${u.name}`); }}>
                      {u.kind}: {u.name}
                    </Chip>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', display: 'flex', gap: 16, flexWrap: 'wrap' }}>
                  <span>Storage: {storageClass}</span>
                  <span>Capacity: {capacity}</span>
                  {accessModes.length > 0 && <span>Modes: {accessModes.join(', ')}</span>}
                </div>
              </div>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)', flexShrink: 0 }}>{age}</span>
            </div>
          </div>
        );
      };

      // Render PV cards
      const renderPVCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const age = item.metadata?.creationTimestamp ? new Date(item.metadata.creationTimestamp).toLocaleDateString() : '';
        const claimRef = item.spec?.claimRef;
        const storageClass = item.spec?.storageClassName || '-';
        const capacity = item.spec?.capacity?.storage || '-';
        const accessModes = item.spec?.accessModes || [];
        const usedBy = item._usedBy || [];

        const isBound = !!claimRef;

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/persistentvolumes/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4, flexWrap: 'wrap' }}>
                  <StatusDot color={isBound ? '#10b981' : '#6b7280'} />
                  <span style={{ fontWeight: 600, fontSize: 14 }}>{name}</span>
                  <Chip color={isBound ? '#10b981' : '#6b7280'}>{isBound ? 'Bound' : 'Available'}</Chip>
                  {claimRef && (
                    <Chip color="#0ea5e9" onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${claimRef.namespace}/persistentvolumeclaims/${claimRef.name}`); }}>
                      Claim: {claimRef.name}
                    </Chip>
                  )}
                  {usedBy.map((u, j) => (
                    <Chip key={j} color={u.kind === 'Elasticsearch' || u.kind === 'Kibana' ? '#6366f1' : '#8b5cf6'}
                      onClick={(e) => { e.stopPropagation(); navigate(`/bundle/${bundleId}/ns/${ns}/${u.type}/${u.name}`); }}>
                      {u.kind}: {u.name}
                    </Chip>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', display: 'flex', gap: 16, flexWrap: 'wrap' }}>
                  <span>Storage: {storageClass}</span>
                  <span>Capacity: {capacity}</span>
                  {accessModes.length > 0 && <span>Modes: {accessModes.join(', ')}</span>}
                </div>
              </div>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)', flexShrink: 0 }}>{age}</span>
            </div>
          </div>
        );
      };

      // Generic fallback card
      const renderGenericCard = (item, i) => {
        const name = item.metadata?.name || 'Unknown';
        const age = item.metadata?.creationTimestamp ? new Date(item.metadata.creationTimestamp).toLocaleDateString() : '';

        return (
          <div key={i} className="card" style={{ padding: '14px 18px', marginBottom: 8, cursor: 'pointer', transition: 'box-shadow 0.2s' }}
            onClick={() => navigate(`/bundle/${bundleId}/ns/${ns}/${type}/${name}`)}
            onMouseOver={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'}
            onMouseOut={e => e.currentTarget.style.boxShadow = ''}
          >
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontWeight: 600, fontSize: 14 }}>{name}</span>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{age}</span>
            </div>
          </div>
        );
      };

      const renderCard = (item, i) => {
        switch (type) {
          case 'statefulsets':
          case 'deployments':
          case 'daemonsets':
          case 'replicasets':
            return renderWorkloadCard(item, i);
          case 'pods':
            return renderPodCard(item, i);
          case 'configmaps':
            return renderConfigMapCard(item, i);
          case 'secrets':
            return renderSecretCard(item, i);
          case 'services':
            return renderServiceCard(item, i);
          case 'endpoints':
            return renderEndpointCard(item, i);
          case 'persistentvolumeclaims':
            return renderPVCCard(item, i);
          case 'persistentvolumes':
            return renderPVCard(item, i);
          default:
            return renderGenericCard(item, i);
        }
      };

      // Count summary
      const getSummary = () => {
        if (type === 'pods') {
          const running = resources.filter(r => r.status?.phase === 'Running').length;
          const pending = resources.filter(r => r.status?.phase === 'Pending').length;
          const failed = resources.filter(r => r.status?.phase === 'Failed').length;
          return `${running} running${pending ? `, ${pending} pending` : ''}${failed ? `, ${failed} failed` : ''}`;
        }
        if (['statefulsets', 'deployments', 'daemonsets', 'replicasets'].includes(type)) {
          const healthy = resources.filter(r => r._replicaStatus && r._replicaStatus.ready >= r._replicaStatus.desired && r._replicaStatus.desired > 0).length;
          return `${healthy}/${resources.length} healthy`;
        }
        return `${resources.length} item${resources.length !== 1 ? 's' : ''}`;
      };

      return (
        <div className="main-content p-8">
          <div className="mb-6">
            <div className="breadcrumb">
              <Link to={`/bundle/${bundleId}`} className="text-link">Dashboard</Link>
              <span style={{ color: 'var(--text-secondary)' }}>{typeLabel}</span>
            </div>
          </div>

          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 16 }}>
            <h1 className="text-2xl font-bold">{typeLabel}</h1>
            <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{getSummary()}</span>
          </div>

          {resources.length > 0 && visibleCount < resources.length && (
            <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 10 }}>
              Rendering {visibleCount}/{resources.length}...
            </div>
          )}

          <div>
            {resources.length === 0 ? (
              <div className="card" style={{ padding: 24, textAlign: 'center', color: 'var(--text-secondary)' }}>
                No {type} found in this namespace.
              </div>
            ) : (
              visibleResources.map((item, i) => renderCard(item, i))
            )}
          </div>
        </div>
      );
    }

    // Describe-style field row
    const DescField = ({ label, children, mono }) => (
      <div className="flex py-1.5 border-b border-gray-100 last:border-b-0">
        <div className="w-48 flex-shrink-0 text-sm text-gray-500 font-medium">{label}:</div>
        <div className={`flex-1 text-sm ${mono ? 'font-mono text-xs' : ''}`}>{children}</div>
      </div>
    );

    // Kubectl describe-style output renderer
    const DescribeView = ({ data }) => {
      // Strip leading underscore from enriched field keys and format as readable label
      const formatKey = (k) => {
        const clean = k.startsWith('_') ? k.slice(1) : k;
        return clean.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()).trim();
      };
      const renderDescribeValue = (value, indent = 0) => {
        const pad = '  '.repeat(indent);
        if (value === null || value === undefined) return `${pad}<none>\n`;
        if (typeof value === 'boolean') return `${pad}${value}\n`;
        if (typeof value === 'number' || typeof value === 'string') return `${pad}${value}\n`;
        if (Array.isArray(value)) {
          if (value.length === 0) return `${pad}[]\n`;
          // Simple arrays (strings/numbers)
          if (value.every(v => typeof v === 'string' || typeof v === 'number')) {
            return `${pad}${JSON.stringify(value)}\n`;
          }
          return value.map((item, i) => {
            if (typeof item === 'object' && item !== null) {
              return `${pad}- ` + Object.entries(item).map(([k, v], j) => {
                const label = formatKey(k);
                if (j === 0) return `${label}:  ${typeof v === 'object' ? '\n' + renderDescribeValue(v, indent + 2) : v}\n`;
                return `${pad}  ${label}:  ${typeof v === 'object' ? '\n' + renderDescribeValue(v, indent + 2) : v}\n`;
              }).join('');
            }
            return `${pad}- ${item}\n`;
          }).join('');
        }
        if (typeof value === 'object') {
          return Object.entries(value).map(([k, v]) => {
            const label = formatKey(k);
            if (typeof v === 'object' && v !== null) {
              return `${pad}${label}:\n${renderDescribeValue(v, indent + 1)}`;
            }
            return `${pad}${label}:  ${v === null || v === undefined ? '<none>' : v}\n`;
          }).join('');
        }
        return `${pad}${value}\n`;
      };
      return (
        <pre style={{ fontFamily: 'monospace', fontSize: 13, lineHeight: 1.5, whiteSpace: 'pre-wrap', color: 'var(--log-text, #e2e8f0)', padding: '12px', backgroundColor: 'var(--log-bg)', borderRadius: '4px', border: '1px solid var(--border-primary)' }}>
          {renderDescribeValue(data)}
        </pre>
      );
    };

    // Resource Detail Page - kubectl describe style
    function ResourceDetailPage() {
      const { bundleId, ns, type, name } = useParams();
      const [resource, setResource] = useState(null);
      const [events, setEvents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [rawViewMode, setRawViewMode] = useState('describe');

      useEffect(() => {
        let cancelled = false;
        setLoading(true);
        setResource(null);
        setEvents([]);

        Promise.all([
          api.getResource(bundleId, ns, type, name),
          fetch(`/api/bundle/${bundleId}/ns/${ns}/events/${encodeURIComponent(name)}`).then(r => r.json()).catch(() => [])
        ]).then(([res, evts]) => {
          if (cancelled) return;
          setResource(res);
          setEvents(Array.isArray(evts) ? evts : []);
        }).finally(() => {
          if (!cancelled) setLoading(false);
        });

        return () => {
          cancelled = true;
        };
      }, [bundleId, ns, type, name]);

      if (loading) return <div className="main-content p-8">Loading {type} {name}...</div>;
      if (!resource) return <div className="main-content p-8">Resource not found</div>;

      const meta = resource.metadata || {};
      const spec = resource.spec || {};
      const status = resource.status || {};
      const ownerLinks = resource._ownerLinks || (meta.ownerReferences || []).map(o => ({kind: o.kind, name: o.name}));

      // Strip managedFields from metadata and full JSON display
      const cleanMeta = {...meta};
      delete cleanMeta.managedFields;
      const cleanResource = {...resource};
      if (cleanResource.metadata) {
        cleanResource.metadata = {...cleanResource.metadata};
        delete cleanResource.metadata.managedFields;
      }

      // Helper: render a value as a colorized code block
      const CodeValue = ({ value }) => {
        let display;
        if (value === null || value === undefined) {
          display = 'null';
        } else if (typeof value === 'object') {
          display = JSON.stringify(value, null, 2);
        } else {
          display = String(value);
        }
        // Simple syntax highlighting
        const highlighted = display
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"([^"]+)"(\s*:)/g, '<span style="color:#0ea5e9">"$1"</span>$2')
          .replace(/:\s*"([^"]*)"/g, ': <span style="color:#10b981">"$1"</span>')
          .replace(/:\s*(true|false)/g, ': <span style="color:#f59e0b">$1</span>')
          .replace(/:\s*(-?\d+\.?\d*)/g, ': <span style="color:#8b5cf6">$1</span>')
          .replace(/:\s*(null)/g, ': <span style="color:#6b7280">$1</span>');
        return (
          <pre className="p-3 rounded text-xs font-mono overflow-auto max-h-96"
            style={{
              backgroundColor: 'var(--log-bg)',
              color: 'var(--log-text)',
              border: '1px solid var(--border-primary)',
              lineHeight: 1.6,
              margin: '4px 0 0 0'
            }}
            dangerouslySetInnerHTML={{__html: highlighted}}
          />
        );
      };

      // Helper: key-value section renderer (for annotations, status, spec)
      const KVSection = ({ title, data, defaultOpen = true }) => {
        if (!data || typeof data !== 'object' || Object.keys(data).length === 0) return null;
        const entries = Object.entries(data);
        return (
          <div className="card p-6 mb-6">
            <h2 className="text-lg font-bold mb-4">{title}</h2>
            <div className="space-y-1">
              {entries.map(([key, val]) => (
                <details key={key} open={defaultOpen}>
                  <summary className="cursor-pointer py-2 px-3 rounded font-mono text-sm font-bold hover:opacity-80"
                    style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                  >
                    {key}
                    {(typeof val !== 'object' || val === null) && (
                      <span className="ml-3 font-normal text-xs" style={{color: 'var(--text-secondary)'}}>
                        {String(val).length > 60 ? String(val).substring(0, 60) + '...' : ''}
                      </span>
                    )}
                  </summary>
                  <div className="mt-1 ml-1">
                    <CodeValue value={val} />
                  </div>
                </details>
              ))}
            </div>
          </div>
        );
      };

      // Type-specific sections
      const renderConfigMapDetails = () => {
        const dataKeys = resource._dataKeys || Object.entries(resource.data || {}).map(([k, v]) => ({name: k, size: (v || '').length}));
        return (
          <div className="card p-6 mb-6">
            <h2 className="text-lg font-bold mb-4">Data</h2>
            <div className="space-y-1">
              {dataKeys.map(dk => (
                <div key={dk.name} className="flex items-center justify-between py-2 border-b border-gray-100">
                  <span className="font-mono text-sm text-brand-700">{dk.name}</span>
                  <span className="text-xs text-gray-500">{dk.size} bytes</span>
                </div>
              ))}
              {dataKeys.length === 0 && <div className="text-sm text-gray-400">No data keys</div>}
            </div>
            {resource.data && Object.entries(resource.data).map(([key, value]) => (
              <details key={key} open className="mt-3 border rounded">
                <summary className="px-3 py-2 cursor-pointer font-mono text-sm font-semibold bg-gray-50 hover:bg-gray-100">{key}</summary>
                <pre className="p-3 text-xs overflow-auto max-h-64 bg-surface-50">{String(value)}</pre>
              </details>
            ))}
          </div>
        );
      };

      const renderSecretDetails = () => {
        const dataKeys = resource._dataKeys || Object.keys(resource.data || {}).map(k => ({name: k, size: '***'}));
        const certInfo = resource.certificateInfo || resource._certificateInfo;
        const isTLS = resource._isTLS;
        const certPurpose = resource._certPurpose;
        const relatedResources = resource._relatedResources || [];
        return (
          <React.Fragment>
            {/* TLS/Certificate Info Banner */}
            {isTLS && (
              <div className="card p-6 mb-6 border-l-4 border-brand-500">
                <h2 className="text-lg font-bold mb-4">Certificate Details</h2>
                <DescField label="Type">
                  <span className="px-2 py-0.5 bg-brand-50 text-brand-800 rounded text-xs font-semibold">TLS/Certificate Secret</span>
                </DescField>
                {certPurpose && <DescField label="Purpose">{certPurpose}</DescField>}
                {resource.type && <DescField label="Secret Type">{resource.type}</DescField>}
                {certInfo && (
                  <React.Fragment>
                    <DescField label="Not Before">{certInfo.notBefore || 'N/A'}</DescField>
                    <DescField label="Not After">{certInfo.notAfter || 'N/A'}</DescField>
                    {certInfo.subject && <DescField label="Subject">{certInfo.subject}</DescField>}
                    {certInfo.issuer && <DescField label="Issuer">{certInfo.issuer}</DescField>}
                    {certInfo.serialNumber && <DescField label="Serial Number" mono>{certInfo.serialNumber}</DescField>}
                    {certInfo.sans && certInfo.sans.length > 0 && (
                      <DescField label="DNS SANs">
                        <div className="flex flex-wrap gap-1">
                          {certInfo.sans.map((san, i) => (
                            <span key={i} className="px-2 py-0.5 bg-brand-50 text-brand-800 rounded text-xs font-mono">{san}</span>
                          ))}
                        </div>
                      </DescField>
                    )}
                    {certInfo.ips && certInfo.ips.length > 0 && (
                      <DescField label="IP SANs">
                        <div className="flex flex-wrap gap-1">
                          {certInfo.ips.map((ip, i) => (
                            <span key={i} className="px-2 py-0.5 bg-gray-100 rounded text-xs font-mono">{ip}</span>
                          ))}
                        </div>
                      </DescField>
                    )}
                  </React.Fragment>
                )}
                {!certInfo && (
                  <div className="text-sm text-gray-500 mt-2 italic">
                    Certificate data not available in diagnostic bundle (stripped for security)
                  </div>
                )}
                {relatedResources.length > 0 && (
                  <DescField label="Related Resources">
                    {relatedResources.map((r, i) => (
                      <Link key={i} to={`/bundle/${bundleId}/ns/${ns}/${normalizeType(r.kind)}/${r.name}`}
                        className="text-brand-700 hover:underline mr-3"
                      >{r.kind}/{r.name}</Link>
                    ))}
                  </DescField>
                )}
              </div>
            )}

            {/* Data Keys */}
            {dataKeys.length > 0 && (
              <div className="card p-6 mb-6">
                <h2 className="text-lg font-bold mb-4">Data Keys</h2>
                <div className="space-y-1">
                  {dataKeys.map(dk => (
                    <div key={dk.name} className="flex items-center justify-between py-2 border-b border-gray-100">
                      <span className="font-mono text-sm">{dk.name}</span>
                      <span className="text-xs text-gray-500">{typeof dk.size === 'number' ? `${dk.size} bytes` : dk.size}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Non-TLS secret: still show type */}
            {!isTLS && (
              <div className="card p-6 mb-6">
                <h2 className="text-lg font-bold mb-4">Secret Info</h2>
                <DescField label="Type">{resource.type || 'Opaque'}</DescField>
                {dataKeys.length === 0 && (
                  <div className="text-sm text-gray-500 mt-2 italic">
                    Secret data not included in diagnostic bundle
                  </div>
                )}
              </div>
            )}
          </React.Fragment>
        );
      };

      const renderPodDetails = () => {
        const specContainers = spec.containers || [];
        const specInitContainers = spec.initContainers || [];
        const containerStatuses = status.containerStatuses || [];
        const initContainerStatuses = status.initContainerStatuses || [];

        // Match spec containers with their statuses
        const getContainerStatus = (name, statuses) => statuses.find(cs => cs.name === name) || {};

        // Determine actual state text
        const getStateInfo = (state) => {
          if (!state) return { label: 'Unknown', color: '#6b7280' };
          const stateKey = Object.keys(state)[0];
          const stateDetail = state[stateKey] || {};
          if (stateKey === 'running') return { label: 'Running', color: '#10b981', detail: stateDetail.startedAt ? `since ${new Date(stateDetail.startedAt).toLocaleString()}` : '' };
          if (stateKey === 'terminated') return {
            label: `Terminated (${stateDetail.reason || 'Unknown'})`,
            color: stateDetail.exitCode === 0 ? '#10b981' : '#ef4444',
            detail: [
              stateDetail.exitCode !== undefined ? `Exit: ${stateDetail.exitCode}` : '',
              stateDetail.startedAt ? `Started: ${new Date(stateDetail.startedAt).toLocaleString()}` : '',
              stateDetail.finishedAt ? `Finished: ${new Date(stateDetail.finishedAt).toLocaleString()}` : '',
              stateDetail.message || ''
            ].filter(Boolean).join(' | ')
          };
          if (stateKey === 'waiting') return { label: `Waiting (${stateDetail.reason || 'Unknown'})`, color: '#f59e0b', detail: stateDetail.message || '' };
          return { label: stateKey, color: '#6b7280' };
        };

        // Find volume mounts for a container
        const getVolumeMounts = (container) => {
          const mounts = container.volumeMounts || [];
          return mounts.map(mount => {
            const vol = (spec.volumes || []).find(v => v.name === mount.name);
            let sourceType = 'unknown';
            let sourceName = '';
            let linkType = null;
            if (vol) {
              if (vol.configMap) { sourceType = 'ConfigMap'; sourceName = vol.configMap.name; linkType = 'configmaps'; }
              else if (vol.secret) { sourceType = 'Secret'; sourceName = vol.secret.secretName; linkType = 'secrets'; }
              else if (vol.persistentVolumeClaim) { sourceType = 'PVC'; sourceName = vol.persistentVolumeClaim.claimName; linkType = 'persistentvolumeclaims'; }
              else if (vol.emptyDir !== undefined) { sourceType = 'EmptyDir'; sourceName = ''; }
              else if (vol.hostPath) { sourceType = 'HostPath'; sourceName = vol.hostPath.path; }
              else if (vol.downwardAPI) { sourceType = 'DownwardAPI'; }
              else if (vol.projected) { sourceType = 'Projected'; }
              else { sourceType = Object.keys(vol).find(k => k !== 'name') || 'unknown'; }
            }
            return { ...mount, sourceType, sourceName, linkType };
          });
        };

        // Get env var refs for a container
        const getEnvRefs = (container) => {
          const refs = [];
          (container.env || []).forEach(env => {
            if (env.valueFrom) {
              if (env.valueFrom.configMapKeyRef) refs.push({ type: 'ConfigMap', name: env.valueFrom.configMapKeyRef.name, key: env.valueFrom.configMapKeyRef.key, envName: env.name, linkType: 'configmaps' });
              if (env.valueFrom.secretKeyRef) refs.push({ type: 'Secret', name: env.valueFrom.secretKeyRef.name, key: env.valueFrom.secretKeyRef.key, envName: env.name, linkType: 'secrets' });
              if (env.valueFrom.fieldRef) refs.push({ type: 'FieldRef', name: env.valueFrom.fieldRef.fieldPath, envName: env.name });
              if (env.valueFrom.resourceFieldRef) refs.push({ type: 'ResourceField', name: env.valueFrom.resourceFieldRef.resource, envName: env.name });
            }
          });
          (container.envFrom || []).forEach(ef => {
            if (ef.configMapRef) refs.push({ type: 'ConfigMap (all)', name: ef.configMapRef.name, linkType: 'configmaps' });
            if (ef.secretRef) refs.push({ type: 'Secret (all)', name: ef.secretRef.name, linkType: 'secrets' });
          });
          return refs;
        };

        const renderContainer = (container, statusInfo, label, defaultOpen) => {
          const cs = statusInfo;
          const stateInfo = getStateInfo(cs.state);
          const mounts = getVolumeMounts(container);
          const envRefs = getEnvRefs(container);
          const resources = container.resources || {};

          return (
            <details key={container.name} open={defaultOpen} className="border rounded mb-3 overflow-hidden">
              <summary className="px-4 py-3 cursor-pointer flex items-center gap-3 hover:opacity-80"
                style={{backgroundColor: 'var(--bg-tertiary)'}}
              >
                <span style={{
                  display: 'inline-block', width: 8, height: 8, borderRadius: '50%',
                  backgroundColor: stateInfo.color, flexShrink: 0
                }} />
                <span className="font-semibold text-sm">{container.name}</span>
                {label && <span className="text-xs px-2 py-0.5 rounded" style={{backgroundColor: 'var(--bg-secondary)', color: 'var(--text-secondary)'}}>{label}</span>}
                <span className="text-xs" style={{color: stateInfo.color, fontWeight: 500}}>{stateInfo.label}</span>
                {cs.restartCount > 0 && <span className="text-xs text-amber-600">Restarts: {cs.restartCount}</span>}
              </summary>
              <div className="px-4 py-3 space-y-2 text-sm">
                <DescField label="Image">{container.image}</DescField>
                <DescField label="Image ID" mono>{cs.imageID || cs.image || 'N/A'}</DescField>
                <DescField label="Container ID" mono>{cs.containerID || 'N/A'}</DescField>
                <DescField label="Ready">{String(cs.ready !== undefined ? cs.ready : 'N/A')}</DescField>
                <DescField label="Restart Count">{String(cs.restartCount || 0)}</DescField>
                <DescField label="State">
                  <span style={{color: stateInfo.color, fontWeight: 500}}>{stateInfo.label}</span>
                  {stateInfo.detail && <span className="text-xs ml-2" style={{color: 'var(--text-secondary)'}}>{stateInfo.detail}</span>}
                </DescField>
                {cs.lastState && Object.keys(cs.lastState).length > 0 && (
                  <DescField label="Last State">
                    {(() => { const ls = getStateInfo(cs.lastState); return (
                      <span><span style={{color: ls.color}}>{ls.label}</span>{ls.detail && <span className="text-xs ml-2" style={{color: 'var(--text-secondary)'}}>{ls.detail}</span>}</span>
                    ); })()}
                  </DescField>
                )}

                {/* Command/Args */}
                {container.command && (
                  <DescField label="Command">
                    <code className="text-xs font-mono break-all">{container.command.join(' ')}</code>
                  </DescField>
                )}
                {container.args && (
                  <DescField label="Args">
                    <code className="text-xs font-mono break-all">{container.args.join(' ')}</code>
                  </DescField>
                )}

                {/* Ports */}
                {container.ports && container.ports.length > 0 && (
                  <DescField label="Ports">
                    {container.ports.map((p, pi) => (
                      <span key={pi} className="mr-2 text-xs font-mono">
                        {p.name && `${p.name}: `}{p.containerPort}/{p.protocol || 'TCP'}
                      </span>
                    ))}
                  </DescField>
                )}

                {/* Resources */}
                {(resources.requests || resources.limits) && (
                  <DescField label="Resources">
                    <div className="text-xs font-mono">
                      {resources.requests && <div>Requests: {Object.entries(resources.requests).map(([k,v]) => `${k}=${v}`).join(', ')}</div>}
                      {resources.limits && <div>Limits: {Object.entries(resources.limits).map(([k,v]) => `${k}=${v}`).join(', ')}</div>}
                    </div>
                  </DescField>
                )}

                {/* Probes */}
                {container.readinessProbe && (
                  <DescField label="Readiness Probe">
                    <code className="text-xs font-mono break-all">{JSON.stringify(container.readinessProbe)}</code>
                  </DescField>
                )}
                {container.livenessProbe && (
                  <DescField label="Liveness Probe">
                    <code className="text-xs font-mono break-all">{JSON.stringify(container.livenessProbe)}</code>
                  </DescField>
                )}

                {/* Volume Mounts */}
                {mounts.length > 0 && (
                  <div className="mt-2">
                    <div className="text-xs font-semibold mb-1" style={{color: 'var(--text-secondary)'}}>Volume Mounts</div>
                    <div className="space-y-1">
                      {mounts.map((m, mi) => (
                        <div key={mi} className="flex items-center gap-2 text-xs py-1 border-b border-gray-100 last:border-b-0">
                          <span className="font-mono font-semibold w-40 truncate" title={m.mountPath}>{m.mountPath}</span>
                          <span className="px-1.5 py-0.5 rounded text-xs" style={{backgroundColor: 'var(--bg-tertiary)'}}>{m.sourceType}</span>
                          {m.linkType && m.sourceName ? (
                            <Link to={`/bundle/${bundleId}/ns/${ns}/${m.linkType}/${m.sourceName}`} className="text-brand-700 hover:underline">{m.sourceName}</Link>
                          ) : (
                            <span style={{color: 'var(--text-secondary)'}}>{m.sourceName || m.name}</span>
                          )}
                          {m.readOnly && <span className="text-xs text-amber-600">(ro)</span>}
                          {m.subPath && <span className="text-xs" style={{color: 'var(--text-secondary)'}}>subPath: {m.subPath}</span>}
