                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Env Refs */}
                {envRefs.length > 0 && (
                  <div className="mt-2">
                    <div className="text-xs font-semibold mb-1" style={{color: 'var(--text-secondary)'}}>Environment References</div>
                    <div className="space-y-1">
                      {envRefs.map((ref, ri) => (
                        <div key={ri} className="flex items-center gap-2 text-xs py-1">
                          {ref.envName && <span className="font-mono">{ref.envName}:</span>}
                          <span className="px-1.5 py-0.5 rounded" style={{backgroundColor: 'var(--bg-tertiary)'}}>{ref.type}</span>
                          {ref.linkType ? (
                            <Link to={`/bundle/${bundleId}/ns/${ns}/${ref.linkType}/${ref.name}`} className="text-brand-700 hover:underline">{ref.name}</Link>
                          ) : (
                            <span style={{color: 'var(--text-secondary)'}}>{ref.name}</span>
                          )}
                          {ref.key && <span style={{color: 'var(--text-secondary)'}}>→ {ref.key}</span>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </details>
          );
        };

        return (
          <React.Fragment>
            {/* Containers */}
            {specContainers.length > 0 && (
              <div className="card p-6 mb-6">
                <h2 className="text-lg font-bold mb-4">Containers ({specContainers.length})</h2>
                {specContainers.map(c => renderContainer(c, getContainerStatus(c.name, containerStatuses), null, true))}
              </div>
            )}

            {/* Init Containers */}
            {specInitContainers.length > 0 && (
              <div className="card p-6 mb-6">
                <h2 className="text-lg font-bold mb-4">Init Containers ({specInitContainers.length})</h2>
                {specInitContainers.map(c => renderContainer(c, getContainerStatus(c.name, initContainerStatuses), 'init', true))}
              </div>
            )}

            {/* Scheduling */}
            {spec.nodeName && (
              <div className="card p-6 mb-6">
                <h2 className="text-lg font-bold mb-4">Scheduling</h2>
                <DescField label="Node">{spec.nodeName}</DescField>
                {spec.serviceAccountName && <DescField label="Service Account">{spec.serviceAccountName}</DescField>}
                {status.podIP && <DescField label="Pod IP">{status.podIP}</DescField>}
                {status.hostIP && <DescField label="Host IP">{status.hostIP}</DescField>}
                {status.qosClass && <DescField label="QoS Class">{status.qosClass}</DescField>}
              </div>
            )}

            {/* Volumes Summary */}
            {spec.volumes && spec.volumes.length > 0 && (
              <div className="card p-6 mb-6">
                <h2 className="text-lg font-bold mb-4">Volumes ({spec.volumes.length})</h2>
                {spec.volumes.map((vol, i) => {
                  const volType = Object.keys(vol).find(k => k !== 'name') || 'unknown';
                  const volRef = vol[volType];
                  const refName = typeof volRef === 'object' ? (volRef.claimName || volRef.name || volRef.secretName || '') : '';
                  const linkType = vol.persistentVolumeClaim ? 'persistentvolumeclaims' : vol.configMap ? 'configmaps' : vol.secret ? 'secrets' : null;
                  // Find which containers mount this volume
                  const mountedIn = [...(spec.containers || []), ...(spec.initContainers || [])]
                    .filter(c => (c.volumeMounts || []).some(m => m.name === vol.name))
                    .map(c => {
                      const mount = (c.volumeMounts || []).find(m => m.name === vol.name);
                      return { container: c.name, mountPath: mount?.mountPath, readOnly: mount?.readOnly, subPath: mount?.subPath };
                    });

                  return (
                    <details key={i} open className="border rounded mb-2 overflow-hidden">
                      <summary className="px-3 py-2 cursor-pointer flex items-center gap-3 hover:opacity-80"
                        style={{backgroundColor: 'var(--bg-tertiary)'}}
                      >
                        <span className="font-mono text-sm font-semibold">{vol.name}</span>
                        <span className="text-xs px-2 py-0.5 rounded" style={{backgroundColor: 'var(--bg-secondary)'}}>{volType}</span>
                        {linkType && refName && (
                          <Link to={`/bundle/${bundleId}/ns/${ns}/${linkType}/${refName}`}
                            className="text-brand-700 text-xs hover:underline"
                            onClick={e => e.stopPropagation()}
                          >{refName}</Link>
                        )}
                        {!linkType && refName && <span className="text-xs" style={{color: 'var(--text-secondary)'}}>{refName}</span>}
                      </summary>
                      <div className="px-3 py-2 text-xs space-y-1">
                        {/* Volume source details */}
                        {typeof volRef === 'object' && volRef !== null && Object.entries(volRef).map(([k, v]) => (
                          <div key={k} className="flex gap-2">
                            <span className="font-semibold w-32" style={{color: 'var(--text-secondary)'}}>{k}:</span>
                            <span className="font-mono">{typeof v === 'object' ? JSON.stringify(v) : String(v)}</span>
                          </div>
                        ))}
                        {typeof volRef !== 'object' && <div className="font-mono">{JSON.stringify(volRef)}</div>}
                        {/* Mounted in */}
                        {mountedIn.length > 0 && (
                          <div className="mt-1 pt-1 border-t border-gray-100">
                            <span className="font-semibold" style={{color: 'var(--text-secondary)'}}>Mounted in:</span>
                            {mountedIn.map((m, mi) => (
                              <div key={mi} className="ml-2 flex gap-2">
                                <span className="font-semibold">{m.container}</span>
                                <span className="font-mono">{m.mountPath}</span>
                                {m.readOnly && <span className="text-amber-600">(ro)</span>}
                                {m.subPath && <span style={{color: 'var(--text-secondary)'}}>subPath: {m.subPath}</span>}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </details>
                  );
                })}
              </div>
            )}
          </React.Fragment>
        );
      };

      const renderServiceDetails = () => {
        const endpoints = resource._endpoints;
        const subsets = endpoints ? (endpoints.subsets || []) : [];
        return (
          <React.Fragment>
            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">Service Details</h2>
              <DescField label="Type">{spec.type || 'ClusterIP'}</DescField>
              <DescField label="Cluster IP">{spec.clusterIP || 'None'}</DescField>
              {status.loadBalancer?.ingress && (
                <DescField label="External IP">
                  {status.loadBalancer.ingress.map(i => i.ip || i.hostname).join(', ')}
                </DescField>
              )}
              {spec.ports && (
                <DescField label="Ports">
                  {spec.ports.map((p, i) => (
                    <span key={i} className="mr-3 font-mono text-xs">
                      {p.name && <span className="text-gray-500">{p.name}: </span>}
                      {p.port}{p.targetPort ? `→${p.targetPort}` : ''}/{p.protocol || 'TCP'}
                      {p.nodePort ? ` (NodePort: ${p.nodePort})` : ''}
                    </span>
                  ))}
                </DescField>
              )}
              {spec.selector && (
                <DescField label="Selector">
                  {Object.entries(spec.selector).map(([k, v]) => (
                    <span key={k} className="mr-2 px-2 py-0.5 bg-gray-100 rounded text-xs font-mono">{k}={v}</span>
                  ))}
                </DescField>
              )}
            </div>
            {subsets.length > 0 && (
              <div className="card p-6 mb-6">
                <h2 className="text-lg font-bold mb-4">Endpoints</h2>
                {subsets.map((ep, i) => (
                  <div key={i} className="border rounded p-3 mb-2">
                    <div className="flex flex-wrap gap-2">
                      {ep.addresses && ep.addresses.map((addr, ai) => (
                        <div key={ai} className="text-sm px-2 py-1 bg-green-50 rounded border border-green-200">
                          <span className="font-mono">{addr.ip}</span>
                          {addr.hostname && <span className="text-gray-500 ml-1">({addr.hostname})</span>}
                          {addr.targetRef && (
                            <Link to={`/bundle/${bundleId}/ns/${ns}/pods/${addr.targetRef.name}`}
                              className="ml-1 text-brand-700 hover:underline text-xs"
                            >{addr.targetRef.name}</Link>
                          )}
                        </div>
                      ))}
                    </div>
                    {ep.ports && (
                      <div className="text-xs text-gray-500 mt-1">
                        Ports: {ep.ports.map(p => `${p.name || ''}:${p.port}/${p.protocol || 'TCP'}`).join(', ')}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </React.Fragment>
        );
      };

      const renderEndpointDetails = () => {
        const subsets = Array.isArray(resource.subsets) ? resource.subsets : [];
        const usedBy = Array.isArray(resource._usedBy) ? resource._usedBy : [];
        const serviceRef = resource._service;

        return (
          <React.Fragment>
            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">Specification</h2>
              <DescField label="Service">
                {serviceRef?.name ? (
                  <Link to={`/bundle/${bundleId}/ns/${ns}/services/${serviceRef.name}`} className="text-brand-700 hover:underline">
                    {serviceRef.name}
                  </Link>
                ) : (
                  <span style={{color: 'var(--text-secondary)'}}>No matching service found</span>
                )}
              </DescField>
              <DescField label="Subsets">{subsets.length}</DescField>
            </div>

            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">Endpoint Subsets</h2>
              {subsets.length === 0 ? (
                <div className="text-sm" style={{color: 'var(--text-secondary)'}}>No endpoint subsets available.</div>
              ) : (
                <div className="space-y-4">
                  {subsets.map((subset, i) => {
                    const readyAddresses = Array.isArray(subset.addresses) ? subset.addresses : [];
                    const notReadyAddresses = Array.isArray(subset.notReadyAddresses) ? subset.notReadyAddresses : [];
                    const ports = Array.isArray(subset.ports) ? subset.ports : [];

                    const portLabel = ports.length > 0
                      ? ports.map((p) => `${p.name || 'unnamed'}:${p.port}/${p.protocol || 'TCP'}`).join(', ')
                      : 'none';

                    const renderAddressRow = (addr, isReady, key) => {
                      const targetRef = addr?.targetRef || {};
                      const targetKind = targetRef.kind || '';
                      const targetName = targetRef.name || '';
                      const targetType = normalizeType(targetKind);
                      const hasTargetLink = targetKind && targetName && targetType;

                      return (
                        <tr key={key}>
                          <td className="mono">{addr?.hostname || '-'}</td>
                          <td className="mono">{addr?.nodeName || '-'}</td>
                          <td className="mono">{addr?.ip || '-'}</td>
                          <td className="mono">{portLabel}</td>
                          <td>
                            {hasTargetLink ? (
                              <Link to={`/bundle/${bundleId}/ns/${ns}/${targetType}/${targetName}`} className="text-brand-700 hover:underline">
                                {targetName}
                              </Link>
                            ) : (
                              <span style={{color: 'var(--text-secondary)'}}>{targetName || '-'}</span>
                            )}
                          </td>
                          <td>
                            <StatusBadge status={isReady ? 'Ready' : 'NotReady'} />
                          </td>
                        </tr>
                      );
                    };

                    return (
                      <div key={i} className="border rounded overflow-hidden" style={{borderColor: 'var(--border-primary)'}}>
                        <div className="px-4 py-3" style={{backgroundColor: 'var(--bg-tertiary)'}}>
                          <div className="font-semibold text-sm">Subset {i + 1}</div>
                          <div className="text-xs" style={{color: 'var(--text-secondary)'}}>
                            {readyAddresses.length} ready, {notReadyAddresses.length} not ready
                          </div>
                        </div>
                        <div className="p-0">
                          <table className="table">
                            <thead>
                              <tr>
                                <th>Hostname</th>
                                <th>Node</th>
                                <th>IP</th>
                                <th>Ports</th>
                                <th>Pod</th>
                                <th>Status</th>
                              </tr>
                            </thead>
                            <tbody>
                              {readyAddresses.map((addr, ai) => renderAddressRow(addr, true, `r-${i}-${ai}`))}
                              {notReadyAddresses.map((addr, ai) => renderAddressRow(addr, false, `nr-${i}-${ai}`))}
                              {readyAddresses.length === 0 && notReadyAddresses.length === 0 && (
                                <tr>
                                  <td colSpan={6} className="text-sm" style={{color: 'var(--text-secondary)'}}>No addresses in this subset.</td>
                                </tr>
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {usedBy.length > 0 && (
              <div className="card p-6 mb-6">
                <h2 className="text-lg font-bold mb-4">Used By</h2>
                <div className="flex flex-wrap gap-2">
                  {usedBy.map((u, i) => {
                    if (!u?.kind || !u?.name) return null;
                    const targetType = u.type || normalizeType(u.kind);
                    return (
                      <Link
                        key={`${u.kind}-${u.name}-${i}`}
                        to={`/bundle/${bundleId}/ns/${ns}/${targetType}/${u.name}`}
                        className="text-xs font-mono px-2 py-1 rounded hover:underline"
                        style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                      >
                        {u.kind}: {u.name}
                      </Link>
                    );
                  })}
                </div>
              </div>
            )}
          </React.Fragment>
        );
      };

      const renderWorkloadPodRelationship = () => {
        if (!['statefulsets', 'replicasets', 'deployments', 'daemonsets'].includes(type)) return null;

        const relatedPods = Array.isArray(resource._relatedPods) ? resource._relatedPods : [];
        const relatedReplicaSets = Array.isArray(resource._relatedReplicaSets) ? resource._relatedReplicaSets : [];
        const workloadLabel = {
          statefulsets: 'StatefulSet',
          replicasets: 'ReplicaSet',
          deployments: 'Deployment',
          daemonsets: 'DaemonSet',
        }[type] || type;

        return (
          <div className="card p-6 mb-6">
            <h2 className="text-lg font-bold mb-4">{workloadLabel} -> Pods</h2>

            {type === 'deployments' && relatedReplicaSets.length > 0 && (
              <DescField label="ReplicaSets">
                <div className="flex items-center gap-2 flex-wrap">
                  {relatedReplicaSets.map((rsName, i) => (
                    <Link key={i}
                      to={`/bundle/${bundleId}/ns/${ns}/replicasets/${rsName}`}
                      className="text-xs font-mono px-2 py-1 rounded hover:underline"
                      style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                    >{rsName}</Link>
                  ))}
                </div>
              </DescField>
            )}

            <DescField label="Pods">
              {relatedPods.length === 0 ? (
                <span style={{color: 'var(--text-secondary)'}}>No related pods found</span>
              ) : (
                <div className="flex items-center gap-2 flex-wrap">
                  {relatedPods.map((pod, i) => (
                    <Link key={i}
                      to={`/bundle/${bundleId}/ns/${ns}/pods/${pod.name}`}
                      className="text-xs font-mono px-2 py-1 rounded hover:underline"
                      style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                    >
                      {pod.name}
                      {pod.phase ? ` (${pod.phase})` : ''}
                    </Link>
                  ))}
                </div>
              )}
            </DescField>
          </div>
        );
      };

      // ES relationship display
      const renderElasticsearchRelationship = () => {
        if (type !== 'elasticsearch') return null;
        const esName = meta.name;
        const nodeSets = spec.nodeSets || [];
        if (nodeSets.length === 0) return null;
        return (
          <>
            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">NodeSet Details</h2>
              <div className="space-y-4">
                {nodeSets.map((ns_item, i) => {
                  const nsName = ns_item.name || `nodeset-${i}`;
                  const rawNodeRoles = ns_item.config?.['node.roles'];
                  const nodeRoles = Array.isArray(rawNodeRoles)
                    ? rawNodeRoles
                    : (rawNodeRoles ? [String(rawNodeRoles)] : []);
                  const stsName = `${esName}-es-${nsName}`;
                  const count = ns_item.count || 0;
                  const pods = Array.from({length: count}, (_, j) => `${stsName}-${j}`);
                  const volumeClaimTemplates = ns_item.volumeClaimTemplates || [];
                  const podTemplateResources = ns_item.podTemplate?.spec?.containers?.[0]?.resources || {};
                  const containerImage = ns_item._resolvedImage || ns_item.podTemplate?.spec?.containers?.[0]?.image || 'N/A';

                  return (
                    <details key={i} className="border rounded-lg overflow-hidden" open>
                      <summary className="px-4 py-3 font-semibold text-sm cursor-pointer hover:opacity-80 flex items-center gap-3"
                        style={{backgroundColor: 'var(--bg-tertiary)'}}
                      >
                        <span className="px-2 py-0.5 rounded text-xs font-bold text-white" style={{backgroundColor: '#6366f1'}}>nodeSet</span>
                        <span>{nsName}</span>
                        <span className="text-xs" style={{color: 'var(--text-secondary)'}}>({count} node{count !== 1 ? 's' : ''})</span>
                      </summary>
                      <div className="px-4 py-4 border-t" style={{borderColor: 'var(--border-primary)'}}>
                        <DescField label="Count">{count}</DescField>
                        <DescField label="StatefulSet">
                          <Link to={`/bundle/${bundleId}/ns/${ns}/statefulsets/${stsName}`}
                            className="text-sm font-mono text-brand-700 hover:underline"
                          >{stsName}</Link>
                        </DescField>

                        <DescField label="Pods">
                          <div className="flex items-center gap-2 flex-wrap">
                            {pods.map((podName, j) => (
                              <Link key={j} to={`/bundle/${bundleId}/ns/${ns}/pods/${podName}`}
                                className="text-xs font-mono px-2 py-1 rounded hover:underline"
                                style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                              >{podName}</Link>
                            ))}
                          </div>
                        </DescField>

                        {nodeRoles.length > 0 && (
                          <DescField label="Node Roles">
                            <div className="flex flex-wrap gap-1">
                              {nodeRoles.map((role, j) => (
                                <span key={j} className="node-role-pill">
                                  {role}
                                </span>
                              ))}
                            </div>
                          </DescField>
                        )}
                        <DescField label="Image">{containerImage}</DescField>

                        {volumeClaimTemplates.length > 0 ? (
                          <DescField label="Storage">
                            <div className="space-y-2">
                              {volumeClaimTemplates.map((vct, j) => {
                                const vctName = vct.metadata?.name || `Volume ${j + 1}`;
                                const isNonDefault = vctName !== 'elasticsearch-data';
                                return (
                                  <div key={j} className="text-sm">
                                    <div className="font-semibold" style={isNonDefault ? {color: '#dc2626'} : {}}>
                                      {vctName}
                                      {isNonDefault && <span className="ml-2 text-xs font-normal px-1.5 py-0.5 rounded" style={{backgroundColor: '#fef2f2', color: '#dc2626', border: '1px solid #fecaca'}}>Non-default volume name</span>}
                                    </div>
                                    <div style={{color: 'var(--text-secondary)', fontSize: '0.875rem'}}>
                                      Size: {vct.spec?.resources?.requests?.storage || 'N/A'}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </DescField>
                        ) : (
                          <DescField label="Storage">
                            <span style={{color: 'var(--text-secondary)'}}>Using default (no volumeClaimTemplates defined)</span>
                          </DescField>
                        )}

                        {Object.keys(podTemplateResources).length > 0 && (
                          <DescField label="Pod Resources">
                            {podTemplateResources.requests && (
                              <div className="text-sm">
                                <div className="font-semibold text-xs text-gray-600">Requests:</div>
                                <div style={{color: 'var(--text-secondary)'}}>
                                  CPU: {podTemplateResources.requests.cpu || 'N/A'} | Memory: {podTemplateResources.requests.memory || 'N/A'}
                                </div>
                              </div>
                            )}
                            {podTemplateResources.limits && (
                              <div className="text-sm">
                                <div className="font-semibold text-xs text-gray-600">Limits:</div>
                                <div style={{color: 'var(--text-secondary)'}}>
                                  CPU: {podTemplateResources.limits.cpu || 'N/A'} | Memory: {podTemplateResources.limits.memory || 'N/A'}
                                </div>
                              </div>
                            )}
                          </DescField>
                        )}

                        {ns_item.config && (
                          <DescField label="Configuration">
                            <div className="space-y-1 font-mono text-sm">
                              {Object.entries(ns_item.config).map(([key, val]) => (
                                <div key={key}>
                                  <span style={{color: 'var(--text-secondary)'}}>{key}:</span> <span className="text-brand-700">{JSON.stringify(val)}</span>
                                </div>
                              ))}
                            </div>
                          </DescField>
                        )}
                      </div>
                    </details>
                  );
                })}
              </div>
            </div>

            {/* Volume Claim Delete Policy */}
            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">Volume Claim Delete Policy</h2>
              <DescField label="Policy">{spec.volumeClaimDeletePolicy || 'default (DeleteOnScaledownOnly)'}</DescField>
            </div>
          </>
        );
      };

      // Beat relationship display - Beat CRD → Deployment/DaemonSet → Pods
      const renderBeatRelationship = () => {
        if (!['beat', 'agent'].includes(type)) return null;
        const beatName = meta.name;
        const beatSpec = spec;
        const relatedWorkloads = Array.isArray(resource._relatedWorkloads) ? resource._relatedWorkloads : [];

        let workloadsToRender = relatedWorkloads;

        // Fallback for older bundles where backend enrichment is not present.
        if (workloadsToRender.length === 0) {
          const hasDeployment = beatSpec.deployment !== undefined;
          const hasDaemonSet = beatSpec.daemonSet !== undefined;
          const workloadType = hasDeployment ? 'Deployment' : hasDaemonSet ? 'DaemonSet' : null;
          if (!workloadType) return null;

          const beatType = String(beatSpec.type || '').trim();
          const workloadName = type === 'beat'
            ? (beatType ? `${beatName}-beat-${beatType}` : `${beatName}-beat`)
            : `${beatName}-agent`;

          workloadsToRender = [{
            kind: workloadType,
            name: workloadName,
            type: workloadType === 'Deployment' ? 'deployments' : 'daemonsets',
            pods: Array.isArray(resource._relatedPods) ? resource._relatedPods : [],
            replicaStatus: {
              desired: hasDeployment ? (beatSpec.deployment.replicas || 1) : null,
              ready: null,
              available: null,
            },
          }];
        }

        return (
          <div className="card p-6 mb-6">
            <h2 className="text-lg font-bold mb-4">{type.charAt(0).toUpperCase() + type.slice(1)} → Workloads → Pods</h2>
            <div className="space-y-3">
              {workloadsToRender.map((workload, i) => {
                const pods = Array.isArray(workload.pods) ? workload.pods : [];
                const replicaStatus = workload.replicaStatus || {};
                const replicaText = typeof replicaStatus.desired === 'number'
                  ? `${replicaStatus.ready ?? 0}/${replicaStatus.desired} ready`
                  : (workload.kind === 'DaemonSet' ? '(per node)' : '');

                return (
                  <div key={`${workload.kind}-${workload.name}-${i}`} className="border rounded-lg overflow-hidden">
                    <div className="px-4 py-3 font-semibold text-sm flex items-center gap-3"
                      style={{backgroundColor: 'var(--bg-tertiary)'}}
                    >
                      <span className="px-2 py-0.5 rounded text-xs font-bold text-white" style={{backgroundColor: '#6366f1'}}>{type}</span>
                      <span>{beatName}</span>
                      {replicaText && (
                        <span className="text-xs" style={{color: 'var(--text-secondary)'}}>({replicaText})</span>
                      )}
                    </div>

                    <div className="px-4 py-2 border-t flex items-center gap-3 flex-wrap" style={{borderColor: 'var(--border-primary)'}}>
                      <span className="text-xs">→</span>
                      <span className="px-2 py-0.5 rounded text-xs font-bold text-white" style={{backgroundColor: '#8b5cf6'}}>{workload.kind}</span>
                      <Link to={`/bundle/${bundleId}/ns/${ns}/${workload.type}/${workload.name}`}
                        className="text-sm font-mono text-brand-700 hover:underline"
                      >{workload.name}</Link>
                    </div>

                    <div className="px-4 py-3 border-t" style={{borderColor: 'var(--border-primary)'}}>
                      <DescField label="Pods">
                        {pods.length === 0 ? (
                          <span style={{color: 'var(--text-secondary)'}}>No related pods found</span>
                        ) : (
                          <div className="flex items-center gap-2 flex-wrap">
                            {pods.map((pod, j) => (
                              <Link key={`${pod.name}-${j}`}
                                to={`/bundle/${bundleId}/ns/${ns}/pods/${pod.name}`}
                                className="text-xs font-mono px-2 py-1 rounded hover:underline"
                                style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                              >
                                {pod.name}
                                {pod.phase ? ` (${pod.phase})` : ''}
                              </Link>
                            ))}
                          </div>
                        )}
                      </DescField>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      // Kibana relationship display - Kibana CRD → Deployment/DaemonSet → Pods
      const renderKibanaRelationship = () => {
        if (type !== 'kibana') return null;

        const relatedWorkloads = Array.isArray(resource._relatedWorkloads) ? resource._relatedWorkloads : [];
        const kibanaName = meta.name;

        let workloadsToRender = relatedWorkloads;

        // Fallback for older bundles where enrichment may be absent.
        if (workloadsToRender.length === 0 && kibanaName) {
          workloadsToRender = [{
            kind: 'Deployment',
            name: `${kibanaName}-kb`,
            type: 'deployments',
            pods: Array.isArray(resource._relatedPods) ? resource._relatedPods : [],
            replicaStatus: {
              desired: typeof spec.count === 'number' ? spec.count : null,
              ready: null,
              available: null,
            },
          }];
        }

        if (workloadsToRender.length === 0) return null;

        return (
          <div className="card p-6 mb-6">
            <h2 className="text-lg font-bold mb-4">Kibana → Workloads → Pods</h2>
            <div className="space-y-3">
              {workloadsToRender.map((workload, i) => {
                const pods = Array.isArray(workload.pods) ? workload.pods : [];
                const replicaStatus = workload.replicaStatus || {};
                const replicaText = typeof replicaStatus.desired === 'number'
                  ? `${replicaStatus.ready ?? 0}/${replicaStatus.desired} ready`
                  : '';

                return (
                  <div key={`${workload.kind}-${workload.name}-${i}`} className="border rounded-lg overflow-hidden">
                    <div className="px-4 py-3 font-semibold text-sm flex items-center gap-3"
                      style={{backgroundColor: 'var(--bg-tertiary)'}}
                    >
                      <span className="px-2 py-0.5 rounded text-xs font-bold text-white" style={{backgroundColor: '#6366f1'}}>kibana</span>
                      <span>{kibanaName}</span>
                      {replicaText && (
                        <span className="text-xs" style={{color: 'var(--text-secondary)'}}>
                          ({replicaText})
                        </span>
                      )}
                    </div>

                    <div className="px-4 py-2 border-t flex items-center gap-3 flex-wrap" style={{borderColor: 'var(--border-primary)'}}>
                      <span className="text-xs">→</span>
                      <span className="px-2 py-0.5 rounded text-xs font-bold text-white" style={{backgroundColor: '#8b5cf6'}}>{workload.kind}</span>
                      <Link to={`/bundle/${bundleId}/ns/${ns}/${workload.type}/${workload.name}`}
                        className="text-sm font-mono text-brand-700 hover:underline"
                      >{workload.name}</Link>
                    </div>

                    <div className="px-4 py-3 border-t" style={{borderColor: 'var(--border-primary)'}}>
                      <DescField label="Pods">
                        {pods.length === 0 ? (
                          <span style={{color: 'var(--text-secondary)'}}>No related pods found</span>
                        ) : (
                          <div className="flex items-center gap-2 flex-wrap">
                            {pods.map((pod, j) => (
                              <Link key={`${pod.name}-${j}`}
                                to={`/bundle/${bundleId}/ns/${ns}/pods/${pod.name}`}
                                className="text-xs font-mono px-2 py-1 rounded hover:underline"
                                style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                              >
                                {pod.name}
                                {pod.phase ? ` (${pod.phase})` : ''}
                              </Link>
                            ))}
                          </div>
                        )}
                      </DescField>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      // Annotations filtered
      const annotations = cleanMeta.annotations || {};
      const annotationEntries = Object.entries(annotations);

      // Status and spec - filter managedFields (already done in cleanMeta)
      const statusEntries = status && typeof status === 'object' ? Object.entries(status) : [];
      const specEntries = spec && typeof spec === 'object' ? Object.entries(spec) : [];

      return (
        <div className="main-content p-8">
          <div className="mb-6">
            <div className="breadcrumb">
              <Link to={`/bundle/${bundleId}`} className="text-link">Dashboard</Link>
              <Link to={`/bundle/${bundleId}/ns/${ns}/${type}`} className="text-link">{type}</Link>
              <span style={{color: 'var(--text-secondary)'}}>{name}</span>
            </div>
          </div>

          <h1 className="text-2xl font-bold mb-2">{name}</h1>
          <div className="text-sm mb-6" style={{color: 'var(--text-secondary)'}}>{type} in namespace {ns}</div>

          {/* 1. Metadata (with labels inline) */}
          <div className="card p-6 mb-6">
            <h2 className="text-lg font-bold mb-4">Metadata</h2>
            <DescField label="Name">{cleanMeta.name}</DescField>
            <DescField label="Namespace">{cleanMeta.namespace || 'N/A'}</DescField>
            <DescField label="Created">
              {cleanMeta.creationTimestamp ? new Date(cleanMeta.creationTimestamp).toLocaleString() : 'N/A'}
            </DescField>
            <DescField label="UID" mono>{cleanMeta.uid || 'N/A'}</DescField>
            {cleanMeta.resourceVersion && <DescField label="Resource Version">{cleanMeta.resourceVersion}</DescField>}
            {ownerLinks.length > 0 && (
              <DescField label="Controlled By">
                {ownerLinks.map((owner, i) => (
                  <Link key={i} to={`/bundle/${bundleId}/ns/${ns}/${normalizeType(owner.kind)}/${owner.name}`}
                    className="text-brand-700 hover:underline mr-3"
                  >{owner.kind}/{owner.name}</Link>
                ))}
              </DescField>
            )}
            {cleanMeta.labels && Object.keys(cleanMeta.labels).length > 0 && (
              <DescField label="Labels">
                <div className="flex flex-wrap gap-2">
                  {Object.entries(cleanMeta.labels).map(([key, value]) => (
                    <span key={key} className="px-2 py-1 bg-surface-100 rounded text-xs font-mono">
                      <span className="text-gray-600">{key}=</span><span className="text-brand-800">{value}</span>
                    </span>
                  ))}
                </div>
              </DescField>
            )}
          </div>

          {/* 2. Annotations */}
          {annotationEntries.length > 0 && (
            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">Annotations</h2>
              <div className="space-y-1">
                {annotationEntries.map(([key, val]) => {
                  let displayVal = val;
                  try {
                    if (typeof val === 'string' && (val.trim().startsWith('{') || val.trim().startsWith('['))) {
                      displayVal = JSON.parse(val);
                    }
                  } catch(e) {}
                  return (
                    <details key={key} open>
                      <summary className="cursor-pointer py-2 px-3 rounded font-mono text-sm font-bold hover:opacity-80"
                        style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                      >{key}</summary>
                      <div className="mt-1 ml-1">
                        <CodeValue value={displayVal} />
                      </div>
                    </details>
                  );
                })}
              </div>
            </div>
          )}

          {/* 3. Status */}
          <KVSection title="Status" data={status} defaultOpen={true} />

          {/* 4. Specification */}
          <KVSection title="Specification" data={spec} defaultOpen={true} />

          {/* 5. Type-specific sections */}
          {type === 'elasticsearch' && renderElasticsearchRelationship()}
          {type === 'kibana' && renderKibanaRelationship()}
          {['beat', 'agent'].includes(type) && renderBeatRelationship()}
          {['statefulsets', 'replicasets', 'deployments', 'daemonsets'].includes(type) && renderWorkloadPodRelationship()}
          {type === 'configmaps' && renderConfigMapDetails()}
          {type === 'secrets' && renderSecretDetails()}
          {type === 'pods' && renderPodDetails()}
          {type === 'services' && renderServiceDetails()}
          {type === 'endpoints' && renderEndpointDetails()}

          {/* 6. Events */}
          {events.length > 0 && (
            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">Events ({events.length})</h2>
              <div className="overflow-hidden">
                <table className="table">
                  <thead>
                    <tr>
                      <th>Type</th>
                      <th>Reason</th>
                      <th>Message</th>
                      <th>Count</th>
                      <th>Last Seen</th>
                    </tr>
                  </thead>
                  <tbody>
                    {events.map((event, i) => (
                      <tr key={i}>
                        <td><StatusBadge status={event.type} /></td>
                        <td className="font-semibold text-sm">{event.reason}</td>
                        <td className="text-sm max-w-md" style={{color: 'var(--text-secondary)'}}>{event.message}</td>
                        <td className="text-sm">{event.count}</td>
                        <td className="text-xs whitespace-nowrap" style={{color: 'var(--text-secondary)'}}>
                          {event.lastTimestamp ? new Date(event.lastTimestamp).toLocaleString() : 'N/A'}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* 7. Raw Output section */}
          <div className="card p-6">
            <details>
              <summary className="text-lg font-bold cursor-pointer hover:opacity-80">Raw Output</summary>
              <div className="mt-3">
                <div className="flex gap-1 bg-gray-100 rounded p-1 mb-3" style={{display: 'inline-flex'}}>
                  <button onClick={() => setRawViewMode('json')}
                    className={`px-3 py-1 rounded text-sm ${rawViewMode === 'json' ? 'bg-white shadow text-brand-700 font-semibold' : 'text-gray-600'}`}
                  >JSON</button>
                  <button onClick={() => setRawViewMode('describe')}
                    className={`px-3 py-1 rounded text-sm ${rawViewMode === 'describe' ? 'bg-white shadow text-brand-700 font-semibold' : 'text-gray-600'}`}
                  >Describe</button>
                </div>
                {rawViewMode === 'json' ? (
                  <CodeValue value={cleanResource} />
                ) : (
                  <DescribeView data={cleanResource} />
                )}
              </div>
            </details>
          </div>
        </div>
      );
    }

    // Gemini Review Page
    function GeminiReviewPage() {
      const { bundleId } = useParams();
      const [hasGeminiApiKey, setHasGeminiApiKey] = useState(false);
      const [checkingConfig, setCheckingConfig] = useState(true);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [notes, setNotes] = useState('');
      const [review, setReview] = useState('');
      const [meta, setMeta] = useState(null);

      useEffect(() => {
        setCheckingConfig(true);
        api.getConfig()
          .then(cfg => setHasGeminiApiKey(!!cfg?.hasGeminiApiKey))
          .catch(() => setHasGeminiApiKey(false))
          .finally(() => setCheckingConfig(false));
      }, []);

      const runReview = () => {
        setLoading(true);
        setError('');
        api.getGeminiReview(bundleId, notes)
          .then(result => {
            setReview(result.review || 'No review text returned.');
            setMeta({ model: result.model, generatedAt: result.generatedAt });
          })
          .catch(err => setError(err?.message || 'Gemini review failed'))
          .finally(() => setLoading(false));
      };

      return (
        <div className="main-content p-8">
          <div className="mb-6">
            <div className="breadcrumb">
              <Link to={`/bundle/${bundleId}`} className="text-link">Dashboard</Link>
              <span className="text-gray-600">Gemini Review</span>
            </div>
          </div>

          <h1 className="text-2xl font-bold mb-6">Gemini Review</h1>

          <div className="card p-6 mb-6">
            <p className="text-sm mb-4" style={{color: 'var(--text-secondary)'}}>
              Run an AI-assisted diagnostic review focused on Elastic Stack, ECK, and Kubernetes issues.
              The review is generated from your diagnostic bundle summary and optional notes.
            </p>

            <label className="block text-sm font-semibold mb-2">Optional context for review</label>
            <textarea
              value={notes}
              onChange={(e) => setNotes(e.target.value)}
              rows={4}
              placeholder="Add symptoms, timeline, or what you already checked..."
              className="w-full p-3 border rounded mb-4"
              style={{backgroundColor: 'var(--bg-secondary)', color: 'var(--text-primary)', borderColor: 'var(--border-primary)'}}
            />

            {checkingConfig ? (
              <div className="text-sm" style={{color: 'var(--text-secondary)'}}>Checking Gemini configuration...</div>
            ) : !hasGeminiApiKey ? (
              <div className="text-sm text-red-600">Gemini API key not configured. Add GEMINI_API_KEY in config and restart web.sh.</div>
            ) : (
              <button
                onClick={runReview}
                disabled={loading}
                className="px-4 py-2 bg-brand-600 text-white rounded hover:bg-brand-700 disabled:opacity-60"
              >
                {loading ? 'Reviewing diagnostics...' : 'Review Diagnostics with Gemini'}
              </button>
            )}

            {error && <div className="mt-4 text-sm text-red-600">{error}</div>}
          </div>

          {review && (
            <div className="card p-6">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-lg font-bold">Review Output</h2>
                {meta && (
                  <span className="text-xs" style={{color: 'var(--text-secondary)'}}>
                    {meta.model || 'Gemini'}{meta.generatedAt ? ` • ${new Date(meta.generatedAt).toLocaleString()}` : ''}
                  </span>
                )}
              </div>
              {renderMarkdown(review)}
            </div>
          )}
        </div>
      );
    }

    // Events Page
    function EventsPage() {
      const { bundleId, ns } = useParams();
      const location = useLocation();
      const [events, setEvents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filterType, setFilterType] = useState('');
      const [namespaces, setNamespaces] = useState([]);
      const [selectedNs, setSelectedNs] = useState(ns || '');
      const [sortCol, setSortCol] = useState('timestamp');
      const [sortDir, setSortDir] = useState('desc');

      useEffect(() => {
        const hash = window.location.hash;
        const queryMatch = hash.match(/\?(.+)$/);
        if (queryMatch) {
          const params = parseQueryString('?' + queryMatch[1]);
          if (params.type) setFilterType(params.type);
          if (params.ns) setSelectedNs(params.ns);
        }
      }, []);

      useEffect(() => {
        api.getNamespaces(bundleId).then(setNamespaces);
      }, [bundleId]);

      // If only one namespace exists, auto-select it.
      useEffect(() => {
        if (!selectedNs && namespaces.length === 1) {
          setSelectedNs(namespaces[0]);
        }
      }, [namespaces, selectedNs]);

      useEffect(() => {
        setLoading(true);
        if (selectedNs) {
          api.getEvents(bundleId, selectedNs)
            .then(data => setEvents(Array.isArray(data) ? data.map(e => ({...e, namespace: selectedNs})) : []))
            .finally(() => setLoading(false));
        } else {
          api.getNamespaces(bundleId).then(nsList => {
            Promise.all((nsList || []).map(ns =>
              api.getEvents(bundleId, ns).then(data =>
                (Array.isArray(data) ? data : []).map(e => ({...e, namespace: ns}))
              ).catch(() => [])
            )).then(results => {
              setEvents(results.flat().sort((a, b) => (b.lastTimestamp || b.timestamp || '').localeCompare(a.lastTimestamp || a.timestamp || '')));
              setLoading(false);
            });
          });
        }
      }, [bundleId, selectedNs]);

      const handleSort = (col) => {
        if (sortCol === col) {
          setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
        } else {
          setSortCol(col);
          setSortDir('asc');
        }
      };

      const filteredEvents = events.filter(e =>
        !filterType || e.type === filterType
      );

      const sortedEvents = [...filteredEvents].sort((a, b) => {
        let va, vb;
        switch (sortCol) {
          case 'type': va = a.type || ''; vb = b.type || ''; break;
          case 'reason': va = a.reason || ''; vb = b.reason || ''; break;
          case 'message': va = a.message || ''; vb = b.message || ''; break;
          case 'count': va = a.count || 0; vb = b.count || 0; break;
          case 'namespace': va = a.namespace || ''; vb = b.namespace || ''; break;
          default: va = a.lastTimestamp || a.timestamp || ''; vb = b.lastTimestamp || b.timestamp || '';
        }
        if (typeof va === 'number') return sortDir === 'asc' ? va - vb : vb - va;
        return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });

      const counts = {
        total: events.length,
        info: events.filter(e => e.type === 'Normal').length,
        warning: events.filter(e => e.type === 'Warning').length,
        error: events.filter(e => e.type === 'Error').length
      };

      const SortHeader = ({ col, label }) => (
        <th
          className="cursor-pointer select-none hover:bg-gray-100"
          onClick={() => handleSort(col)}
        >
          {label} {sortCol === col ? (sortDir === 'asc' ? '\u25B2' : '\u25BC') : ''}
        </th>
      );

      return (
        <div className="main-content p-8">
          <div className="mb-6">
            <div className="breadcrumb">
              <Link to={`/bundle/${bundleId}`} className="text-link">Dashboard</Link>
              <span className="text-gray-600">Events</span>
            </div>
          </div>

          <h1 className="text-2xl font-bold mb-6">Events</h1>

          {/* Summary */}
          <div className="grid grid-cols-4 gap-4 mb-8">
            <div className="card p-4 text-center cursor-pointer hover:bg-gray-50"
              onClick={() => setFilterType('')}
            >
              <div className="text-2xl font-bold text-gray-700">{counts.total}</div>
              <div className="text-sm text-gray-600">Total</div>
            </div>
            <div className="card p-4 text-center cursor-pointer hover:bg-green-50"
              onClick={() => setFilterType('Normal')}
            >
              <div className="text-2xl font-bold text-green-600">{counts.info}</div>
              <div className="text-sm text-green-700">Info</div>
            </div>
            <div className="card p-4 text-center cursor-pointer hover:bg-yellow-50"
              onClick={() => setFilterType('Warning')}
            >
              <div className="text-2xl font-bold text-yellow-600">{counts.warning}</div>
              <div className="text-sm text-yellow-700">Warnings</div>
            </div>
            <div className="card p-4 text-center cursor-pointer hover:bg-red-50"
              onClick={() => setFilterType('Error')}
            >
              <div className="text-2xl font-bold text-red-600">{counts.error}</div>
              <div className="text-sm text-red-700">Errors</div>
            </div>
          </div>

          {/* Filters */}
          <div className="card p-4 mb-6 flex gap-4">
            <div>
              <label className="block text-sm font-semibold mb-1">Namespace</label>
              <select
                value={selectedNs}
                onChange={(e) => setSelectedNs(e.target.value)}
                className="px-3 py-2 border rounded"
              >
                <option value="">All Namespaces</option>
                {namespaces.map(n => (
                  <option key={n} value={n}>{n}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1">Type</label>
              <select
                value={filterType}
                onChange={(e) => setFilterType(e.target.value)}
                className="px-3 py-2 border rounded"
              >
                <option value="">All types</option>
                <option value="Normal">Info</option>
                <option value="Warning">Warning</option>
                <option value="Error">Error</option>
              </select>
            </div>
          </div>

          {/* Events Table */}
          {loading ? (
            <div>Loading events...</div>
          ) : (
            <div className="card overflow-hidden">
              <table className="table">
                <thead>
                  <tr>
                    <SortHeader col="type" label="Type" />
                    <SortHeader col="reason" label="Reason" />
                    <SortHeader col="message" label="Message" />
                    <SortHeader col="namespace" label="Namespace" />
                    <SortHeader col="count" label="Count" />
                    <SortHeader col="timestamp" label="Timestamp" />
                  </tr>
                </thead>
                <tbody>
                  {sortedEvents.map((event, i) => (
                    <tr key={i}>
                      <td>
                        <StatusBadge status={event.type} />
                      </td>
                      <td className="font-semibold">{event.reason}</td>
                      <td className="text-sm text-gray-700 max-w-md truncate">{event.message}</td>
                      <td className="text-sm text-gray-600">{event.namespace}</td>
                      <td>{event.count}</td>
                      <td className="text-sm text-gray-600 whitespace-nowrap">
                        {event.lastTimestamp
                          ? new Date(event.lastTimestamp).toLocaleString()
                          : 'Unknown'}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // Logs Page
    function LogsPage() {
      const { bundleId } = useParams();
      const [namespaces, setNamespaces] = useState([]);
      const [selectedNs, setSelectedNs] = useState('');
      const [pods, setPods] = useState([]);
      const [selectedPod, setSelectedPod] = useState('');
      const [logs, setLogs] = useState('');
      const [loading, setLoading] = useState(false);
      const [logFilter, setLogFilter] = useState('');
      const [viewMode, setViewMode] = useState('raw'); // 'raw' | 'structured'
      const [levelFilter, setLevelFilter] = useState('');
      const [sortColumn, setSortColumn] = useState('');
      const [sortDirection, setSortDirection] = useState('asc');
      const [containers, setContainers] = useState([]);
      const [selectedContainer, setSelectedContainer] = useState('');
      const [logFileCount, setLogFileCount] = useState(0);
      const [sinceDays, setSinceDays] = useState(3);
      const [totalLines, setTotalLines] = useState(0);
      const [hasMore, setHasMore] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const LOG_PAGE_SIZE = 5000;

      useEffect(() => {
        api.getNamespaces(bundleId).then(setNamespaces);
      }, [bundleId]);

      // If only one namespace exists, auto-select it.
      useEffect(() => {
        if (!selectedNs && namespaces.length === 1) {
          setSelectedNs(namespaces[0]);
        }
      }, [namespaces, selectedNs]);

      useEffect(() => {
        if (!selectedNs) { setPods([]); return; }
        api.getLogsList(bundleId, selectedNs)
          .then(result => setPods((result || []).sort((a, b) => ((a.pod || a) + '').localeCompare((b.pod || b) + ''))))
          .catch(() => setPods([]));
      }, [bundleId, selectedNs]);

      // If only one pod is available in the selected namespace, auto-select it.
      useEffect(() => {
        if (!selectedNs) return;
        if (pods.length !== 1) return;
        const onlyPod = pods[0]?.pod || pods[0] || '';
        if (onlyPod && selectedPod !== onlyPod) {
          setSelectedPod(onlyPod);
        }
      }, [pods, selectedNs, selectedPod]);

      // Fetch containers when pod is selected
      useEffect(() => {
        if (!selectedNs || !selectedPod) { setContainers([]); setSelectedContainer(''); setLogFileCount(0); return; }
        api.getContainers(bundleId, selectedNs, selectedPod)
          .then(data => {
            const allContainers = (data.containers || [])
              .map(c => ({ ...c, type: 'container' }))
              .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            setContainers(allContainers);
            const onlyContainer = allContainers.length === 1 ? allContainers[0].name : '';
            if (onlyContainer) {
              setSelectedContainer(onlyContainer);
            } else if (selectedContainer && !allContainers.some(c => c.name === selectedContainer)) {
              setSelectedContainer('');
            }
            setLogFileCount((data.logFiles || []).length);
          })
          .catch(() => { setContainers([]); setSelectedContainer(''); setLogFileCount(0); });
      }, [bundleId, selectedNs, selectedPod]);

      // Fetch logs when pod or container changes
      useEffect(() => {
        if (!selectedNs || !selectedPod) { setLogs(''); setTotalLines(0); setHasMore(false); return; }
        setLoading(true);
        const pageLimit = sinceDays === 0 ? undefined : LOG_PAGE_SIZE;
        api.getLogs(bundleId, selectedNs, selectedPod, selectedContainer || undefined, {
          since_days: sinceDays || undefined,
          limit: pageLimit,
        })
          .then(result => {
            setLogs(result.text);
            setTotalLines(result.totalLines);
            setHasMore(result.hasMore);
          })
          .finally(() => setLoading(false));
      }, [bundleId, selectedNs, selectedPod, selectedContainer, sinceDays]);

      const loadMore = () => {
        if (loadingMore || !hasMore) return;
        setLoadingMore(true);
        const currentLineCount = logs.split('\n').length;
        const pageLimit = sinceDays === 0 ? undefined : LOG_PAGE_SIZE;
        api.getLogs(bundleId, selectedNs, selectedPod, selectedContainer || undefined, {
          since_days: sinceDays || undefined,
          offset: currentLineCount,
          limit: pageLimit,
        })
          .then(result => {
            setLogs(prev => prev + '\n' + result.text);
            setHasMore(result.hasMore);
          })
          .finally(() => setLoadingMore(false));
      };

      const loadAll = () => {
        setLoading(true);
        api.getLogs(bundleId, selectedNs, selectedPod, selectedContainer || undefined, {})
          .then(result => {
            setLogs(result.text);
            setTotalLines(result.totalLines);
            setHasMore(false);
          })
          .finally(() => setLoading(false));
      };

      // Parse log lines into JSON and non-JSON
      const parsedLines = useMemo(() => {
        if (!logs) return { json: [], nonJson: [], all: [] };
        const lines = logs.split('\n').filter(l => l.trim());
        const jsonLines = [];
        const nonJsonLines = [];
        lines.forEach((line, idx) => {
          try {
            if (line.trim().startsWith('{')) {
              const parsed = JSON.parse(line);
              jsonLines.push({ idx, raw: line, parsed, isJson: true });
            } else {
              nonJsonLines.push({ idx, raw: line, isJson: false });
            }
          } catch {
            nonJsonLines.push({ idx, raw: line, isJson: false });
          }
        });
        return { json: jsonLines, nonJson: nonJsonLines, all: [...jsonLines, ...nonJsonLines].sort((a, b) => a.idx - b.idx) };
      }, [logs]);

      // Get unique JSON field keys for structured view
      const jsonFields = useMemo(() => {
        if (parsedLines.json.length === 0) return [];
        const fieldSet = new Set();
        parsedLines.json.forEach(l => {
          Object.keys(l.parsed).forEach(k => fieldSet.add(k));
        });
        // Prioritize common fields
        const priority = ['timestamp', '@timestamp', 'ts', 'time', 'level', 'log.level', 'logger', 'message', 'msg', 'component', 'caller'];
        const sorted = [...fieldSet].sort((a, b) => {
          const ai = priority.indexOf(a);
          const bi = priority.indexOf(b);
          if (ai >= 0 && bi >= 0) return ai - bi;
          if (ai >= 0) return -1;
          if (bi >= 0) return 1;
          return a.localeCompare(b);
        });
        return sorted;
      }, [parsedLines.json]);

      // Filter lines
      const filteredLines = useMemo(() => {
        let lines = parsedLines.all;
        if (logFilter) {
          const upper = logFilter.toUpperCase();
          lines = lines.filter(l => l.raw.toUpperCase().includes(upper));
        }
        if (levelFilter) {
          const lf = levelFilter.toLowerCase();
          lines = lines.filter(l => {
            if (l.isJson) {
              const lvl = String(l.parsed.level || l.parsed['log.level'] || '').toLowerCase();
              return lvl.includes(lf);
            }
            return l.raw.toUpperCase().includes(levelFilter.toUpperCase());
          });
        }
        return lines;
      }, [parsedLines.all, logFilter, levelFilter]);

      // Sort JSON lines based on sortColumn and sortDirection
      const sortedJsonLines = useMemo(() => {
        const jsonLines = filteredLines.filter(l => l.isJson);
        if (!sortColumn) return jsonLines; // Default: original order (by idx)

        // Detect if sorting a timestamp-like column
        const tsColumns = ['timestamp', '@timestamp', 'ts', 'time'];
        const isTimestamp = tsColumns.includes(sortColumn);

        return [...jsonLines].sort((a, b) => {
          // Use bracket notation for fields like @timestamp
          let valA = a.parsed[sortColumn];
          let valB = b.parsed[sortColumn];

          // Handle undefined/null
          if (valA == null && valB == null) return 0;
          if (valA == null) return sortDirection === 'asc' ? -1 : 1;
          if (valB == null) return sortDirection === 'asc' ? 1 : -1;

          // Timestamp-aware comparison
          if (isTimestamp) {
            const dateA = new Date(valA);
            const dateB = new Date(valB);
            if (!isNaN(dateA.getTime()) && !isNaN(dateB.getTime())) {
              return sortDirection === 'asc' ? dateA - dateB : dateB - dateA;
            }
          }

          // Handle different value types
          if (typeof valA === 'object') valA = JSON.stringify(valA);
          if (typeof valB === 'object') valB = JSON.stringify(valB);

          valA = String(valA ?? '');
          valB = String(valB ?? '');

          // Try numeric comparison if both look like numbers
          const numA = parseFloat(valA);
          const numB = parseFloat(valB);
          if (!isNaN(numA) && !isNaN(numB)) {
            return sortDirection === 'asc' ? numA - numB : numB - numA;
          }

          // String comparison
          const cmp = valA.localeCompare(valB);
          return sortDirection === 'asc' ? cmp : -cmp;
        });
      }, [filteredLines, sortColumn, sortDirection]);

      const getLogClass = (line) => {
        const upper = (typeof line === 'string' ? line : line.raw || '').toUpperCase();
        if (upper.includes('ERROR') || upper.includes('"LEVEL":"ERROR"')) return 'log-error';
        if (upper.includes('WARN') || upper.includes('"LEVEL":"WARN"')) return 'log-warn';
        if (upper.includes('INFO') || upper.includes('"LEVEL":"INFO"')) return 'log-info';
        if (upper.includes('DEBUG') || upper.includes('"LEVEL":"DEBUG"')) return 'log-debug';
        return '';
      };

      // Fixed structured view columns
      const visibleFields = ['timestamp', '@timestamp', 'ts', 'time', 'log.level', 'level', 'container', 'log.logger', 'message', 'msg']
        .filter(f => jsonFields.includes(f));
      // Ensure we have at least timestamp and message-like columns
      if (visibleFields.length === 0) visibleFields.push(...jsonFields.slice(0, 4));

      // Dynamic level filter options based on actual log data
      const availableLevels = useMemo(() => {
        const levels = new Set();
        parsedLines.json.forEach(l => {
          const lvl = String(l.parsed.level || l.parsed['log.level'] || '').toLowerCase();
          if (lvl) levels.add(lvl);
        });
        // Also check non-JSON lines for level keywords
        parsedLines.nonJson.forEach(l => {
          const upper = l.raw.toUpperCase();
          if (upper.includes('ERROR')) levels.add('error');
          if (upper.includes('WARN')) levels.add('warn');
          if (upper.includes('INFO')) levels.add('info');
          if (upper.includes('DEBUG')) levels.add('debug');
          if (upper.includes('TRACE')) levels.add('trace');
        });
        return [...levels].sort();
      }, [parsedLines]);

      return (
        <div className="main-content p-8">
          <div className="mb-6">
            <div className="breadcrumb">
              <Link to={`/bundle/${bundleId}`} className="text-link">Dashboard</Link>
              <span className="text-gray-600">Logs</span>
            </div>
          </div>

          <h1 className="text-2xl font-bold mb-6">Logs</h1>

          <div className="text-xs mb-4" style={{ color: 'var(--text-secondary)' }}>
            Note: Audit log entries are filtered out.
          </div>

          {/* Filters */}
          <div className="card p-4 mb-6 grid grid-cols-5 gap-4">
            <div>
              <label className="block text-sm font-semibold mb-1">Namespace</label>
              <select
                value={selectedNs}
                onChange={(e) => { setSelectedNs(e.target.value); setSelectedPod(''); }}
                className="w-full px-3 py-2 border rounded"
              >
                <option value="">Select namespace...</option>
                {namespaces.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1">Pod</label>
              <select
                value={selectedPod}
                onChange={(e) => setSelectedPod(e.target.value)}
                disabled={!selectedNs}
                className="w-full px-3 py-2 border rounded"
              >
                <option value="">Select pod...</option>
                {pods.map(pod => (
                  <option key={pod.pod || pod} value={pod.pod || pod}>{pod.pod || pod}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1">Container</label>
              <select
                value={selectedContainer}
                onChange={(e) => setSelectedContainer(e.target.value)}
                disabled={!selectedPod || containers.length === 0}
                className="w-full px-3 py-2 border rounded"
              >
                <option value="">{logFileCount <= 1 && containers.length > 1 ? 'All containers (shared log)' : 'All containers'}</option>
                {containers.map(c => (
                  <option key={c.name} value={c.name}>
                    {c.name}
                  </option>
                ))}
              </select>
              {logFileCount <= 1 && containers.length > 1 && (
                <div className="text-xs text-gray-600 mt-1">Note: All containers share a single log file</div>
              )}
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1">Text Filter</label>
              <input
                type="text"
                value={logFilter}
                onChange={(e) => setLogFilter(e.target.value)}
                placeholder="Search logs..."
                className="w-full px-3 py-2 border rounded"
              />
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1">Level</label>
              <select
                value={levelFilter}
                onChange={(e) => setLevelFilter(e.target.value)}
                className="w-full px-3 py-2 border rounded"
              >
                <option value="">All levels</option>
                {availableLevels.map(lvl => (
                  <option key={lvl} value={lvl}>{lvl.charAt(0).toUpperCase() + lvl.slice(1)}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1">Time Range</label>
              <select
                value={sinceDays}
                onChange={(e) => setSinceDays(parseInt(e.target.value, 10))}
                className="w-full px-3 py-2 border rounded"
              >
                <option value="1">Last 1 day</option>
                <option value="3">Last 3 days</option>
                <option value="7">Last 7 days</option>
                <option value="14">Last 14 days</option>
                <option value="30">Last 30 days</option>
                <option value="0">All time</option>
              </select>
            </div>
          </div>

          {/* Log Display */}
          {loading ? (
            <div className="card p-8 text-center">Loading logs...</div>
          ) : selectedPod ? (
            <div>
              {/* Stats and View Toggle */}
              <div className="card p-4 mb-4 flex items-center justify-between">
                <div className="text-sm text-gray-600">
                  Showing {filteredLines.length} of {parsedLines.all.length} lines
                  {parsedLines.json.length > 0 && (
                    <span className="ml-2 text-brand-600">
                      ({parsedLines.json.length} JSON, {parsedLines.nonJson.length} plain text)
                    </span>
                  )}
                </div>
                {parsedLines.json.length > 0 && (
                  <div className="flex gap-1 bg-gray-100 rounded p-1">
                    <button
                      onClick={() => setViewMode('raw')}
                      className={`px-3 py-1 rounded text-sm ${viewMode === 'raw' ? 'bg-white shadow text-brand-700 font-semibold' : 'text-gray-600'}`}
                    >
                      Raw
                    </button>
                    <button
                      onClick={() => setViewMode('structured')}
                      className={`px-3 py-1 rounded text-sm ${viewMode === 'structured' ? 'bg-white shadow text-brand-700 font-semibold' : 'text-gray-600'}`}
                    >
                      Structured
                    </button>
                  </div>
                )}
              </div>

              {viewMode === 'structured' && parsedLines.json.length > 0 ? (
                <div className="card overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="table">
                      <thead>
                        <tr>
                          {visibleFields.map(f => {
                            const isTimestamp = ['timestamp', '@timestamp', 'ts', 'time'].includes(f);
                            const isLevel = ['level', 'log.level'].includes(f);
                            const isContainer = f === 'container';
                            const isMessage = ['message', 'msg'].includes(f);

                            let width = 'max-w-xs';
                            if (isTimestamp) width = 'w-44';
                            else if (isLevel) width = 'w-20';
                            else if (isContainer) width = 'w-36';
                            else if (isMessage) width = 'flex-1';

                            return (
                              <th
                                key={f}
                                onClick={() => {
                                  if (sortColumn === f) {
                                    setSortDirection(sortDirection === 'asc' ? 'desc' : 'asc');
                                  } else {
                                    setSortColumn(f);
                                    setSortDirection('asc');
                                  }
                                }}
                                className={`text-xs cursor-pointer hover:bg-gray-100 ${width}`}
                              >
                                <div className="flex items-center gap-1">
                                  {f}
                                  {sortColumn === f && (
                                    <span className="text-brand-600 font-bold">
                                      {sortDirection === 'asc' ? '▲' : '▼'}
                                    </span>
                                  )}
                                </div>
                              </th>
                            );
                          })}
                        </tr>
                      </thead>
                      <tbody>
                        {sortedJsonLines.map((line, i) => (
                          <tr key={i} className={getLogClass(line)}>
                            {visibleFields.map(f => {
                              const isTimestamp = ['timestamp', '@timestamp', 'ts', 'time'].includes(f);
                              const isLevel = ['level', 'log.level'].includes(f);
                              const isContainer = f === 'container';
                              const isMessage = ['message', 'msg'].includes(f);

                              let width = 'max-w-xs truncate';
                              if (isTimestamp) width = 'w-44 truncate';
                              else if (isLevel) width = 'w-20 truncate';
                              else if (isContainer) width = 'w-36 truncate';
                              else if (isMessage) width = 'whitespace-pre-wrap break-words';

                              return (
                                <td key={f} className={`text-xs font-mono ${width}`}>
                                  {typeof line.parsed[f] === 'object' ? JSON.stringify(line.parsed[f]) : String(line.parsed[f] ?? '')}
                                </td>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              ) : (
                <div className="card p-4">
                  <div className="log-viewer" style={{maxHeight: '70vh'}}>
                    {filteredLines.map((line, i) => (
                      <div key={i} className={`log-line ${getLogClass(line)}`}>
                        {line.raw}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ) : (
            <div className="card p-8 text-center text-gray-500">
              Select a namespace and pod to view logs
            </div>
          )}
        </div>
      );
    }

    // Graph Page
    function GraphPage() {
      const { bundleId, ns } = useParams();
      const [graph, setGraph] = useState(null);
      const [loading, setLoading] = useState(true);
      const [namespaces, setNamespaces] = useState([]);
      const [selectedNs, setSelectedNs] = useState(ns || '');
      const [hoveredParent, setHoveredParent] = useState(null);
      const [lockedParent, setLockedParent] = useState(null);
      const [zoom, setZoom] = useState(1);
      const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0, scrollLeft: 0, scrollTop: 0 });
      const svgRef = useRef(null);
      const graphViewportRef = useRef(null);
      const navigate = useNavigate();

      useEffect(() => {
        api.getNamespaces(bundleId).then(nsList => {
          setNamespaces(nsList);
          // Default to the namespace containing elasticsearch if none selected
          if (!selectedNs && nsList.length > 0) {
            api.getOverview(bundleId).then(overview => {
              const health = overview.health || {};
              // Find namespace with elasticsearch resources
              const esNs = Object.keys(health).find(ns => {
                const nsHealth = health[ns];
                return (nsHealth.eckResources || []).some(r => r.type === 'elasticsearch');
              });
              setSelectedNs(esNs || nsList[0]);
            }).catch(() => setSelectedNs(nsList[0]));
          }
        });
      }, [bundleId]);

      useEffect(() => {
        if (!selectedNs) return;
        setLoading(true);
        setLockedParent(null);
        setHoveredParent(null);
        api.getRelationships(bundleId, selectedNs)
          .then(setGraph)
          .finally(() => setLoading(false));
      }, [bundleId, selectedNs]);

      const handleWheel = useCallback((e) => {
        const viewport = graphViewportRef.current;
        if (e.shiftKey) {
          e.preventDefault();
          if (viewport) {
            viewport.scrollLeft += e.deltaY;
          }
          return;
        }
        e.preventDefault();
        if (!viewport) return;
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const contentX = viewport.scrollLeft + mouseX;
        const contentY = viewport.scrollTop + mouseY;

        setZoom(prevZoom => {
          const nextZoom = Math.max(0.2, Math.min(8, prevZoom * delta));
          if (nextZoom === prevZoom) return prevZoom;

          const scale = nextZoom / prevZoom;
          const targetScrollLeft = (contentX * scale) - mouseX;
          const targetScrollTop = (contentY * scale) - mouseY;

          requestAnimationFrame(() => {
            const vp = graphViewportRef.current;
            if (!vp) return;
            vp.scrollLeft = targetScrollLeft;
            vp.scrollTop = targetScrollTop;
          });

          return nextZoom;
        });
      }, []);

      const handleMouseDown = useCallback((e) => {
        if (e.target.closest('g[data-clickable]')) return;
        const viewport = graphViewportRef.current;
        if (!viewport) return;
        setIsDraggingCanvas(true);
        setDragStart({
          x: e.clientX,
          y: e.clientY,
          scrollLeft: viewport.scrollLeft,
          scrollTop: viewport.scrollTop,
        });
      }, []);

      const handleMouseMove = useCallback((e) => {
        if (!isDraggingCanvas) return;
        const viewport = graphViewportRef.current;
        if (!viewport) return;
        const dx = e.clientX - dragStart.x;
        const dy = e.clientY - dragStart.y;
        viewport.scrollLeft = dragStart.scrollLeft - (dx * 1.3);
