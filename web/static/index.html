        viewport.scrollTop = dragStart.scrollTop - (dy * 1.1);
      }, [isDraggingCanvas, dragStart]);

      const handleMouseUp = useCallback(() => {
        setIsDraggingCanvas(false);
      }, []);

      if (!selectedNs) {
        return (
          <div className="main-content p-8">
            <h1 className="text-2xl font-bold mb-6">Resource Graph</h1>
            <div className="card p-4">
              <label className="block text-sm font-semibold mb-2">Select Namespace</label>
              <select value={selectedNs} onChange={(e) => setSelectedNs(e.target.value)} className="px-3 py-2 border rounded">
                <option value="">Select...</option>
                {namespaces.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
          </div>
        );
      }

      if (loading) return <div className="main-content p-8">Loading graph...</div>;
      if (!graph || !graph.nodes || graph.nodes.length === 0) return <div className="main-content p-8">No graph data available</div>;

      // Color families - dark parent, lighter children
      const colorFamilies = [
        { dark: '#00897B', mid: '#4DB6AC', light: '#B2DFDB', vlight: '#E0F2F1' },  // teal
        { dark: '#C2185B', mid: '#F06292', light: '#F8BBD0', vlight: '#FCE4EC' },  // pink
        { dark: '#F9A825', mid: '#FFD54F', light: '#FFF9C4', vlight: '#FFFDE7' },  // amber
        { dark: '#1565C0', mid: '#64B5F6', light: '#BBDEFB', vlight: '#E3F2FD' },  // blue
        { dark: '#6A1B9A', mid: '#BA68C8', light: '#E1BEE7', vlight: '#F3E5F5' },  // purple
        { dark: '#2E7D32', mid: '#81C784', light: '#C8E6C9', vlight: '#E8F5E9' },  // green
        { dark: '#E65100', mid: '#FF8A65', light: '#FFCCBC', vlight: '#FBE9E7' },  // orange
        { dark: '#37474F', mid: '#90A4AE', light: '#CFD8DC', vlight: '#ECEFF1' },  // blueGrey
      ];

      const layer0Parents = [...new Set(graph.nodes.filter(n => n.layer === 0).map(n => n.id))];
      const parentColorMap = {};
      const parentFamilyMap = {};
      layer0Parents.forEach((parentId, idx) => {
        const family = colorFamilies[idx % colorFamilies.length];
        parentColorMap[parentId] = family.dark;
        parentFamilyMap[parentId] = family;
      });

      const effectiveParentByNode = (() => {
        const result = {};
        if (!graph || !Array.isArray(graph.nodes)) return result;

        const neighbors = {};
        const addNeighbor = (a, b) => {
          if (!a || !b) return;
          if (!neighbors[a]) neighbors[a] = new Set();
          neighbors[a].add(b);
        };

        (graph.edges || []).forEach(edge => {
          const from = edge.from || edge.source;
          const to = edge.to || edge.target;
          addNeighbor(from, to);
          addNeighbor(to, from);
        });

        // Assign every reachable node to a Layer-0 root using BFS over graph connectivity.
        layer0Parents.forEach(rootId => {
          const queue = [rootId];
          const visited = new Set([rootId]);
          const rootSet = new Set(layer0Parents);

          while (queue.length > 0) {
            const current = queue.shift();
            // Never re-parent a different top-level CRD; each layer-0 node is its own lock domain.
            if (rootSet.has(current) && current !== rootId) {
              continue;
            }

            if (!result[current]) result[current] = rootId;
            const next = neighbors[current];
            if (!next) continue;
            next.forEach(id => {
              if (rootSet.has(id) && id !== rootId) {
                return;
              }
              if (!visited.has(id)) {
                visited.add(id);
                queue.push(id);
              }
            });
          }
        });

        graph.nodes.forEach(node => {
          if (!node || !node.id) return;
          if (!result[node.id]) {
            result[node.id] = node.parentId || node.id;
          }
        });

        return result;
      })();

      const getEffectiveParentId = (node) => {
        if (!node || !node.id) return '';
        return effectiveParentByNode[node.id] || node.parentId || node.id;
      };

      const getNodeColor = (node) => {
        const parentId = getEffectiveParentId(node);
        const family = parentFamilyMap[parentId];
        if (!family) return { fill: '#f8fafc', stroke: '#94a3b8', text: '#1e293b' };
        if (node.layer === 0) return { fill: family.dark, stroke: family.dark, text: '#ffffff' };
        if (node.layer === 1) return { fill: family.light, stroke: family.mid, text: '#1e293b' };
        return { fill: family.vlight, stroke: family.mid, text: '#1e293b' };
      };

      const activeParent = lockedParent || hoveredParent;

      const getHealthState = (health) => {
        const h = String(health || '').toLowerCase();
        if (h === 'green') return 'healthy';
        if (h === 'red' || h === 'yellow') return 'unhealthy';
        return null;
      };

      const healthColor = (healthState) => ({ healthy: '#22c55e', unhealthy: '#ef4444' }[healthState] || null);

      // Calculate viewBox from node coordinates
      const nodeW = 200;
      const nodeH = 50;
      const minX = Math.min(...graph.nodes.map(n => (n.x || 0) - nodeW/2)) - 40;
      const minY = Math.min(...graph.nodes.map(n => (n.y || 0) - nodeH/2)) - 60;
      const maxX = Math.max(...graph.nodes.map(n => (n.x || 0) + nodeW/2)) + 40;
      const maxY = Math.max(...graph.nodes.map(n => (n.y || 0) + nodeH/2)) + 60;
      const viewBoxW = maxX - minX;
      const viewBoxH = maxY - minY;
      const baseSvgWidth = Math.max(1400, Math.round(viewBoxW * 0.7));
      const svgPixelWidth = Math.round(baseSvgWidth * zoom);
      const svgPixelHeight = Math.max(640, Math.round((svgPixelWidth / viewBoxW) * viewBoxH));

      const resetView = () => {
        setZoom(1);
        const viewport = graphViewportRef.current;
        if (viewport) {
          viewport.scrollLeft = 0;
          viewport.scrollTop = 0;
        }
      };

      const layerConfig = {
        0: { label: 'ECK CRDs' }, 1: { label: 'NodeSets' }, 2: { label: 'Workloads' }, 3: { label: 'Pods' },
        4: { label: 'Network' }, 5: { label: 'ConfigMaps' }, 6: { label: 'Secrets' },
        7: { label: 'PVCs' }, 8: { label: 'PVs' }, 9: { label: 'StorageClasses' }
      };

      const uniqueLayers = [...new Set(graph.nodes.map(n => n.layer || 4))].sort((a, b) => a - b);
      const maxNodesInLayer = Math.max(...uniqueLayers.map(l => graph.nodes.filter(n => n.layer === l).length), 1);

      const typeIcons = {
        'elasticsearch': 'ES', 'kibana': 'KB', 'pod': 'Pod', 'service': 'Svc',
        'configmap': 'CM', 'secret': 'Sec', 'pvc': 'PVC', 'deployment': 'Dep',
        'statefulset': 'STS', 'agent': 'Agt', 'beat': 'Beat', 'apmserver': 'APM', 'logstash': 'LS',
        'daemonset': 'DS', 'replicaset': 'RS', 'nodeset': 'NS',
        'persistentvolumeclaim': 'PVC', 'persistentvolumeclaims': 'PVC',
        'persistentvolume': 'PV', 'persistentvolumes': 'PV',
        'storageclass': 'SC', 'storageclasses': 'SC'
      };

      return (
        <div className="main-content p-4" style={{height: 'calc(100vh - 0px)', display: 'flex', flexDirection: 'column'}}>
          <h1 className="text-2xl font-bold mb-4">Resource Graph</h1>

          <div className="card p-4 mb-4 flex flex-wrap gap-4 items-center">
            <div>
              <label className="block text-sm font-semibold mb-1">Namespace</label>
              <select value={selectedNs} onChange={(e) => setSelectedNs(e.target.value)} className="px-3 py-2 border rounded">
                {namespaces.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <div className="flex items-center gap-2 ml-auto">
              <button onClick={() => setZoom(z => Math.min(8, z * 1.2))} className="px-3 py-1 rounded border text-sm font-bold hover:bg-gray-100">+</button>
              <span className="text-sm w-12 text-center">{Math.round(zoom * 100)}%</span>
              <button onClick={() => setZoom(z => Math.max(0.2, z / 1.2))} className="px-3 py-1 rounded border text-sm font-bold hover:bg-gray-100">−</button>
              <button onClick={resetView} className="px-3 py-1 rounded border text-sm hover:bg-gray-100 ml-2">Reset</button>
              {lockedParent && (
                <button onClick={() => setLockedParent(null)} className="px-3 py-1 rounded text-sm text-white ml-2" style={{backgroundColor: parentColorMap[lockedParent] || '#6b7280'}}>
                  Unlock
                </button>
              )}
            </div>
            <div className="flex items-center gap-3 ml-4">
              <div className="flex items-center gap-1"><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',backgroundColor:'#22c55e'}}></span><span className="text-xs">Healthy</span></div>
              <div className="flex items-center gap-1"><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',backgroundColor:'#ef4444'}}></span><span className="text-xs">Unhealthy</span></div>
            </div>
          </div>

          <div className="card" style={{flex: 1, display: 'flex', flexDirection: 'column'}}>
            <div
              ref={graphViewportRef}
              className="graph-scroll-viewport"
              style={{flex: 1, cursor: isDraggingCanvas ? 'grabbing' : 'grab'}}
              onWheel={handleWheel}
              onMouseDown={handleMouseDown}
              onMouseMove={handleMouseMove}
              onMouseUp={handleMouseUp}
              onMouseLeave={handleMouseUp}
            >
              <svg
                ref={svgRef}
                width={svgPixelWidth}
                height={svgPixelHeight}
                viewBox={`${minX} ${minY} ${viewBoxW} ${viewBoxH}`}
                preserveAspectRatio="xMinYMin meet"
              >
              <g>
                <defs>
                  <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="1" dy="2" stdDeviation="3" floodOpacity="0.15" />
                  </filter>
                  <marker id="arrowDefault" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                    <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
                  </marker>
                  {Object.entries(parentColorMap).map(([pid, color]) => (
                    <marker key={`arr-${pid}`} id={`arr-${pid}`} markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                      <polygon points="0 0, 8 3, 0 6" fill={color} />
                    </marker>
                  ))}
                </defs>

                {/* Layer backgrounds */}
                {uniqueLayers.map(layer => {
                  const layerNodes = graph.nodes.filter(n => n.layer === layer);
                  if (layerNodes.length === 0) return null;
                  const xPositions = layerNodes.map(n => n.x || 0);
                  const yPositions = layerNodes.map(n => n.y || 0);
                  const minX = Math.min(...xPositions) - nodeW/2 - 20;
                  const maxX = Math.max(...xPositions) + nodeW/2 + 20;
                  const minY = Math.min(...yPositions) - nodeH/2 - 30;
                  const maxY = Math.max(...yPositions) + nodeH/2 + 30;
                  const centerX = (minX + maxX) / 2;
                  const config = layerConfig[layer] || { label: `Layer ${layer}` };
                  return (
                    <g key={`layer-${layer}`}>
                      <rect x={minX} y={minY} width={maxX - minX} height={maxY - minY}
                        rx="12" fill="var(--bg-tertiary)" stroke="var(--border-primary)" strokeWidth="1" opacity="0.4" />
                      <text x={centerX} y={minY - 8} fontSize="11" fontWeight="700" fill="var(--text-secondary)" textAnchor="middle">
                        {config.label}
                      </text>
                    </g>
                  );
                })}

                {/* Edges */}
                {graph.edges && graph.edges.map((edge, i) => {
                  const fromNode = graph.nodes.find(n => n.id === edge.from);
                  const toNode = graph.nodes.find(n => n.id === edge.to);
                  if (!fromNode || !toNode) return null;

                  const leftNode = (fromNode.layer || 0) <= (toNode.layer || 0) ? fromNode : toNode;
                  const rightNode = leftNode === fromNode ? toNode : fromNode;
                  const x1 = (leftNode.x || 0) + nodeW/2;
                  const y1 = leftNode.y || 0;
                  const x2 = (rightNode.x || 0) - nodeW/2;
                  const y2 = rightNode.y || 0;

                  const parentId = getEffectiveParentId(fromNode);
                  const altParentId = getEffectiveParentId(toNode);
                  const edgeColor = parentColorMap[parentId] || parentColorMap[altParentId] || '#94a3b8';
                  const isActive = activeParent && (activeParent === parentId || activeParent === altParentId);
                  const markerId = parentColorMap[parentId] ? `arr-${parentId}` : parentColorMap[altParentId] ? `arr-${altParentId}` : 'arrowDefault';

                  const dx = x2 - x1;
                  const cpOffset = Math.max(dx * 0.35, 40);

                  return (
                    <path key={`edge-${i}`}
                      d={`M ${x1} ${y1} C ${x1 + cpOffset} ${y1} ${x2 - cpOffset} ${y2} ${x2} ${y2}`}
                      stroke={edgeColor}
                      strokeWidth={isActive ? 3 : 1.5}
                      fill="none"
                      opacity={activeParent ? (isActive ? 0.9 : 0.08) : 0.4}
                      markerEnd={`url(#${markerId})`}
                      style={{transition: 'opacity 0.2s, stroke-width 0.2s'}}
                    />
                  );
                })}

                {/* Nodes */}
                {graph.nodes && graph.nodes.map((node) => {
                  const x = node.x || 0;
                  const y = node.y || 0;
                  const parentId = getEffectiveParentId(node);
                  const isActive = activeParent === parentId;
                  const nodeColor = getNodeColor(node);
                  const healthState = getHealthState(node.health);
                  const hc = healthColor(healthState);
                  const icon = typeIcons[node.type] || node.type.substring(0, 3);
                  const displayName = node.name && node.name.length > 26 ? node.name.substring(0, 24) + '..' : node.name;

                  const handleClick = (e) => {
                    e.stopPropagation();
                    if (e.shiftKey || e.metaKey) {
                      // Shift+click navigates
                      try { navigate(`/bundle/${bundleId}/ns/${selectedNs}/${normalizeType(node.type)}/${node.name}`); } catch {}
                    } else {
                      // Regular click toggles lock
                      const rootParent = node.layer === 0 ? node.id : parentId;
                      setLockedParent(prev => prev === rootParent ? null : rootParent);
                    }
                  };

                  const handleDblClick = (e) => {
                    e.stopPropagation();
                    try { navigate(`/bundle/${bundleId}/ns/${selectedNs}/${normalizeType(node.type)}/${node.name}`); } catch {}
                  };

                  return (
                    <g key={node.id} data-clickable="true"
                      onClick={handleClick}
                      onDoubleClick={handleDblClick}
                      onMouseEnter={() => { if (!lockedParent) setHoveredParent(node.layer === 0 ? node.id : parentId); }}
                      onMouseLeave={() => { if (!lockedParent) setHoveredParent(null); }}
                      style={{
                        cursor: 'pointer',
                        opacity: activeParent ? (isActive ? 1 : 0.15) : 1,
                        transition: 'opacity 0.2s'
                      }}
                    >
                      <title>{node.name} ({node.type}) - Click to highlight, Double-click to open</title>
                      <rect x={x - nodeW/2} y={y - nodeH/2} width={nodeW} height={nodeH}
                        rx="8" fill={nodeColor.fill} stroke={nodeColor.stroke} strokeWidth={node.layer === 0 ? 2.5 : 1.5}
                        filter="url(#nodeShadow)"
                      />
                      {/* Health dot: render only when health is explicitly healthy/unhealthy */}
                      {hc && <circle cx={x - nodeW/2 + 14} cy={y} r="5" fill={hc} />}
                      {/* Type badge */}
                      <text x={x + nodeW/2 - 8} y={y - nodeH/2 + 12} fontSize="8" fontWeight="600"
                        fill={nodeColor.stroke} textAnchor="end" opacity="0.7"
                      >{icon}</text>
                      {/* Name */}
                      <text x={x - nodeW/2 + 28} y={y - 4} fontSize={node.layer === 0 ? 13 : 11}
                        fontWeight={node.layer === 0 ? 'bold' : '600'} fill={nodeColor.text}
                        dominantBaseline="middle"
                      >{displayName}</text>
                      {/* Type label */}
                      <text x={x - nodeW/2 + 28} y={y + 12} fontSize="9" fill={nodeColor.text} opacity="0.6"
                        dominantBaseline="middle"
                      >{node.type}</text>
                    </g>
                  );
                })}
              </g>
            </svg>
            </div>
            <div className="text-xs p-2" style={{color: 'var(--text-secondary)', borderTop: '1px solid var(--border-primary)'}}>
              Click a node to lock highlight on its group. Double-click to open details. Scroll to zoom. Drag canvas to scroll.
            </div>
          </div>

          <div className="text-xs mt-2" style={{ color: 'var(--text-secondary)' }}>
            Horizontal scrollbar is available under the graph when content exceeds the viewport.
          </div>
        </div>
      );
    }

    // Diagnostics Page
    function DiagnosticsPage() {
      const { bundleId } = useParams();
      const [diagnostics, setDiagnostics] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedDiag, setSelectedDiag] = useState(null);
      const [diagFiles, setDiagFiles] = useState([]);
      const [selectedFile, setSelectedFile] = useState(null);
      const [fileContent, setFileContent] = useState('');
      const [fileLoading, setFileLoading] = useState(false);

      useEffect(() => {
        api.getDiagnostics(bundleId)
          .then(setDiagnostics)
          .finally(() => setLoading(false));
      }, [bundleId]);

      // Auto-select when only one diagnostic is available.
      useEffect(() => {
        if (diagnostics.length !== 1) return;
        const onlyDiag = diagnostics[0];
        if (!selectedDiag ||
            selectedDiag.namespace !== onlyDiag.namespace ||
            selectedDiag.type !== onlyDiag.type ||
            selectedDiag.name !== onlyDiag.name) {
          setSelectedDiag(onlyDiag);
          setSelectedFile(null);
        }
      }, [diagnostics, selectedDiag]);

      useEffect(() => {
        if (!selectedDiag) {
          setDiagFiles([]);
          return;
        }
        api.getDiagnosticFiles(bundleId, selectedDiag.namespace, selectedDiag.type, selectedDiag.name)
          .then(files => setDiagFiles(files || []))
          .catch(() => setDiagFiles([]));
      }, [bundleId, selectedDiag]);

      // Auto-select when only one file exists for the selected diagnostic.
      useEffect(() => {
        if (!selectedDiag || diagFiles.length !== 1) return;
        const onlyFile = diagFiles[0];
        if (!selectedFile || selectedFile.name !== onlyFile.name) {
          setSelectedFile(onlyFile);
        }
      }, [selectedDiag, diagFiles, selectedFile]);

      useEffect(() => {
        if (!selectedFile || !selectedDiag) {
          setFileContent('');
          return;
        }
        setFileLoading(true);
        api.getDiagnosticFile(bundleId, selectedDiag.namespace, selectedDiag.type, selectedDiag.name, selectedFile.name)
          .then(setFileContent)
          .catch(() => setFileContent(''))
          .finally(() => setFileLoading(false));
      }, [bundleId, selectedDiag, selectedFile]);

      if (loading) {
        return <div className="main-content p-8">Loading diagnostics...</div>;
      }

      return (
        <div className="main-content p-8">
          <h1 className="text-2xl font-bold mb-6">Diagnostics</h1>

          <div className="grid grid-cols-3 gap-6">
            {/* Diagnostics List */}
            <div className="col-span-1">
              <div className="card p-4 max-h-96 overflow-y-auto">
                {diagnostics.length === 0 ? (
                  <div className="text-gray-500 text-sm">No diagnostics available</div>
                ) : (
                  <div className="space-y-2">
                    {diagnostics.map((diag, i) => (
                      <button
                        key={i}
                        onClick={() => {
                          setSelectedDiag(diag);
                          setSelectedFile(null);
                        }}
                        className={`w-full text-left px-3 py-2 rounded text-sm ${
                          selectedDiag === diag
                            ? 'bg-brand-600 text-white'
                            : 'hover:bg-gray-100'
                        }`}
                      >
                        <div className="font-semibold">{diag.name}</div>
                        <div className="text-xs opacity-75">{diag.type}</div>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Files and Content */}
            <div className="col-span-2">
              {selectedDiag ? (
                <div className="space-y-4">
                  {/* Download button */}
                  <div className="card p-4">
                    <a
                      href={`/api/bundle/${bundleId}/diagnostics-download/${selectedDiag.namespace}/${selectedDiag.type}/${selectedDiag.name}`}
                      className="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 text-white rounded hover:bg-brand-700"
                    >
                      <Icon name="download" size={18} />
                      Download ZIP
                    </a>
                  </div>

                  {/* Files List */}
                  <div className="card p-4">
                    <h3 className="font-semibold mb-3">Files</h3>
                    {diagFiles.length === 0 ? (
                      <div className="text-gray-500 text-sm">No files</div>
                    ) : (
                      <div className="space-y-2 max-h-48 overflow-y-auto">
                        {diagFiles.map((file, i) => (
                          <button
                            key={i}
                            onClick={() => setSelectedFile(file)}
                            className={`w-full text-left px-3 py-2 rounded text-sm flex justify-between items-center ${
                              selectedFile === file
                                ? 'bg-blue-100 text-blue-900'
                                : 'hover:bg-gray-100'
                            }`}
                          >
                            <span className="font-mono text-xs truncate">{file.name}</span>
                            <span className="text-xs text-gray-600 ml-2">{formatBytes(file.size)}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* File Content */}
                  {selectedFile && (
                    <div className="card p-4">
                      <h3 className="font-semibold mb-3">Content: {selectedFile.name}</h3>
                      {fileLoading ? (
                        <div className="text-gray-500">Loading...</div>
                      ) : (
                        <div className="json-viewer max-h-96 overflow-auto">
                          {selectedFile.name.endsWith('.json') ? (
                            (() => {
                              try {
                                const parsed = JSON.parse(fileContent);
                                return <SmartJSON value={parsed} />;
                              } catch (e) {
                                return <pre>{fileContent}</pre>;
                              }
                            })()
                          ) : (
                            <pre className="text-sm">{fileContent}</pre>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ) : (
                <div className="card p-8 text-center text-gray-500">
                  Select a diagnostic to view
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Cluster Resources Page
    function ClusterResourcesPage() {
      const { bundleId } = useParams();
      const navigate = useNavigate();
      const [clusterResources, setClusterResources] = useState(null);
      const [loading, setLoading] = useState(true);
      const [expandedSections, setExpandedSections] = useState({});
      const [expandedEntries, setExpandedEntries] = useState({});

      useEffect(() => {
        api.getClusterResources(bundleId)
          .then(setClusterResources)
          .catch(err => console.error('Failed to fetch cluster resources:', err))
          .finally(() => setLoading(false));
      }, [bundleId]);

      if (loading) {
        return <div className="main-content p-8">Loading cluster resources...</div>;
      }

      if (!clusterResources) {
        return <div className="main-content p-8">Failed to load cluster resources</div>;
      }

      const toggleSection = (section) => {
        setExpandedSections(prev => ({ ...prev, [section]: !prev[section] }));
      };

      const toggleEntry = (id) => {
        setExpandedEntries(prev => ({ ...prev, [id]: !prev[id] }));
      };

      // Parse text entries (split on "Name: ")
      const parseTextEntries = (text) => {
        if (!text) return [];
        const entries = text.split(/(?=Name:)/).filter(e => e.trim());
        return entries.map((entry, i) => ({
          id: i,
          content: entry.trim(),
          name: entry.match(/Name:\s*(\S+)/)?.[1] || `Entry ${i + 1}`
        }));
      };

      const nodeItems = clusterResources.nodes || [];
      const scItems = clusterResources.storageClasses || [];
      const pspItems = clusterResources.podSecurityPolicies || [];
      const clusterRoleEntries = parseTextEntries(clusterResources.clusterRoles || '');
      const clusterRoleBindingEntries = parseTextEntries(clusterResources.clusterRoleBindings || '');

      return (
        <div className="main-content p-8">
          <h1 className="text-2xl font-bold mb-8">Cluster Resources</h1>

          {/* Storage Classes */}
          <div className="mb-8">
            <div
              className="cursor-pointer flex items-center gap-2 mb-4 pb-3 border-b-2 border-brand-500"
              onClick={() => toggleSection('storageclasses')}
            >
              <Icon name={expandedSections.storageclasses ? 'chevronDown' : 'chevronRight'} size={24} />
              <h2 className="text-xl font-semibold">Storage Classes ({scItems.length})</h2>
            </div>
            {expandedSections.storageclasses && (
              <div className="space-y-3">
                {scItems.length === 0 ? (
                  <div className="text-gray-500">No storage classes found</div>
                ) : (
                  <div className="grid gap-3">
                    {scItems.map(item => (
                      <div
                        key={item.metadata?.name}
                        className="card p-4 hover:shadow-md cursor-pointer transition"
                        onClick={() => navigate(`/bundle/${bundleId}/cluster-resources/storageclasses/${item.metadata?.name}`)}
                      >
                        <div className="font-semibold text-brand-600">{item.metadata?.name}</div>
                        <div className="text-sm text-gray-500 mt-1">
                          Provisioner: {item.provisioner || 'N/A'}
                        </div>
                        {item.reclaimPolicy && (
                          <div className="text-sm text-gray-500">
                            Reclaim Policy: {item.reclaimPolicy}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Nodes */}
          <div className="mb-8">
            <div
              className="cursor-pointer flex items-center gap-2 mb-4 pb-3 border-b-2 border-brand-500"
              onClick={() => toggleSection('nodes')}
            >
              <Icon name={expandedSections.nodes ? 'chevronDown' : 'chevronRight'} size={24} />
              <h2 className="text-xl font-semibold">Nodes ({nodeItems.length})</h2>
            </div>
            {expandedSections.nodes && (
              <div className="space-y-3">
                {nodeItems.length === 0 ? (
                  <div className="text-gray-500">No nodes found</div>
                ) : (
                  <div className="grid gap-3">
                    {nodeItems.map(item => (
                      <div
                        key={item.metadata?.name}
                        className="card p-4 hover:shadow-md cursor-pointer transition"
                        onClick={() => navigate(`/bundle/${bundleId}/cluster-resources/nodes/${item.metadata?.name}`)}
                      >
                        <div className="font-semibold text-brand-600">{item.metadata?.name}</div>
                        <div className="text-sm text-gray-500 mt-1">
                          Status: {item.status?.conditions?.find(c => c.type === 'Ready')?.status === 'True' ? 'Ready' : 'Not Ready'}
                        </div>
                        {item.status?.nodeInfo?.kubeletVersion && (
                          <div className="text-sm text-gray-500">
                            Kubelet: {item.status.nodeInfo.kubeletVersion}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Pod Security Policies */}
          {pspItems.length > 0 && (
            <div className="mb-8">
              <div
                className="cursor-pointer flex items-center gap-2 mb-4 pb-3 border-b-2 border-brand-500"
                onClick={() => toggleSection('psps')}
              >
                <Icon name={expandedSections.psps ? 'chevronDown' : 'chevronRight'} size={24} />
                <h2 className="text-xl font-semibold">Pod Security Policies ({pspItems.length})</h2>
              </div>
              {expandedSections.psps && (
                <div className="space-y-3">
                  <div className="grid gap-3">
                    {pspItems.map(item => (
                      <div
                        key={item.metadata?.name}
                        className="card p-4 hover:shadow-md cursor-pointer transition"
                        onClick={() => navigate(`/bundle/${bundleId}/cluster-resources/podsecuritypolicies/${item.metadata?.name}`)}
                      >
                        <div className="font-semibold text-brand-600">{item.metadata?.name}</div>
                        <div className="text-sm text-gray-500 mt-1">
                          Running as User: {item.spec?.runAsUser?.rule || 'N/A'}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Cluster Roles */}
          {clusterRoleEntries.length > 0 && (
            <div className="mb-8">
              <div
                className="cursor-pointer flex items-center gap-2 mb-4 pb-3 border-b-2 border-brand-500"
                onClick={() => toggleSection('clusterroles')}
              >
                <Icon name={expandedSections.clusterroles ? 'chevronDown' : 'chevronRight'} size={24} />
                <h2 className="text-xl font-semibold">Cluster Roles ({clusterRoleEntries.length})</h2>
              </div>
              {expandedSections.clusterroles && (
                <div className="space-y-3">
                  {clusterRoleEntries.map(entry => (
                    <div key={entry.id} className="card">
                      <button
                        className="w-full text-left p-4 hover:bg-gray-50 flex items-center justify-between"
                        onClick={() => toggleEntry(`cr-${entry.id}`)}
                      >
                        <div className="font-semibold text-brand-600">{entry.name}</div>
                        <Icon name={expandedEntries[`cr-${entry.id}`] ? 'chevronDown' : 'chevronRight'} size={20} />
                      </button>
                      {expandedEntries[`cr-${entry.id}`] && (
                        <div className="bg-gray-50 p-4 border-t">
                          <pre className="text-xs font-mono whitespace-pre-wrap break-words max-h-64 overflow-auto">
                            {entry.content}
                          </pre>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Cluster Role Bindings */}
          {clusterRoleBindingEntries.length > 0 && (
            <div className="mb-8">
              <div
                className="cursor-pointer flex items-center gap-2 mb-4 pb-3 border-b-2 border-brand-500"
                onClick={() => toggleSection('clusterrolebindings')}
              >
                <Icon name={expandedSections.clusterrolebindings ? 'chevronDown' : 'chevronRight'} size={24} />
                <h2 className="text-xl font-semibold">Cluster Role Bindings ({clusterRoleBindingEntries.length})</h2>
              </div>
              {expandedSections.clusterrolebindings && (
                <div className="space-y-3">
                  {clusterRoleBindingEntries.map(entry => (
                    <div key={entry.id} className="card">
                      <button
                        className="w-full text-left p-4 hover:bg-gray-50 flex items-center justify-between"
                        onClick={() => toggleEntry(`crb-${entry.id}`)}
                      >
                        <div className="font-semibold text-brand-600">{entry.name}</div>
                        <Icon name={expandedEntries[`crb-${entry.id}`] ? 'chevronDown' : 'chevronRight'} size={20} />
                      </button>
                      {expandedEntries[`crb-${entry.id}`] && (
                        <div className="bg-gray-50 p-4 border-t">
                          <pre className="text-xs font-mono whitespace-pre-wrap break-words max-h-64 overflow-auto">
                            {entry.content}
                          </pre>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // Cluster Resource Detail Page
    function ClusterResourceDetailPage() {
      const { bundleId, type, name } = useParams();
      const navigate = useNavigate();
      const [resource, setResource] = useState(null);
      const [loading, setLoading] = useState(true);
      const [rawViewMode, setRawViewMode] = useState('describe');

      useEffect(() => {
        api.getClusterResource(bundleId, type, name)
          .then(setResource)
          .catch(err => {
            console.error('Failed to fetch cluster resource:', err);
            setResource(null);
          })
          .finally(() => setLoading(false));
      }, [bundleId, type, name]);

      if (loading) {
        return <div className="main-content p-8">Loading...</div>;
      }

      if (!resource) {
        return (
          <div className="main-content p-8">
            <button
              onClick={() => navigate(`/bundle/${bundleId}/cluster-resources`)}
              className="text-brand-600 hover:text-brand-700 mb-4"
            >
              Back to Cluster Resources
            </button>
            <div className="card p-8 text-center text-gray-500">
              Resource not found
            </div>
          </div>
        );
      }

      const meta = resource.metadata || {};
      const spec = resource.spec || {};
      const status = resource.status || {};

      // Strip managedFields
      const cleanMeta = {...meta};
      delete cleanMeta.managedFields;
      const cleanResource = {...resource};
      if (cleanResource.metadata) {
        cleanResource.metadata = {...cleanResource.metadata};
        delete cleanResource.metadata.managedFields;
      }

      const annotations = cleanMeta.annotations || {};
      const annotationEntries = Object.entries(annotations);

      // Reuse CodeValue and KVSection from ResourceDetailPage scope - define inline
      const CodeValue = ({ value }) => {
        let display;
        if (value === null || value === undefined) {
          display = 'null';
        } else if (typeof value === 'object') {
          display = JSON.stringify(value, null, 2);
        } else {
          display = String(value);
        }
        const highlighted = display
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"([^"]+)"(\s*:)/g, '<span style="color:#0ea5e9">"$1"</span>$2')
          .replace(/:\s*"([^"]*)"/g, ': <span style="color:#10b981">"$1"</span>')
          .replace(/:\s*(true|false)/g, ': <span style="color:#f59e0b">$1</span>')
          .replace(/:\s*(-?\d+\.?\d*)/g, ': <span style="color:#8b5cf6">$1</span>')
          .replace(/:\s*(null)/g, ': <span style="color:#6b7280">$1</span>');
        return (
          <pre className="p-3 rounded text-xs font-mono overflow-auto max-h-96"
            style={{
              backgroundColor: 'var(--log-bg)',
              color: 'var(--log-text)',
              border: '1px solid var(--border-primary)',
              lineHeight: 1.6,
              margin: '4px 0 0 0'
            }}
            dangerouslySetInnerHTML={{__html: highlighted}}
          />
        );
      };

      const KVSection = ({ title, data, defaultOpen = true }) => {
        if (!data || typeof data !== 'object' || Object.keys(data).length === 0) return null;
        const entries = Object.entries(data);
        return (
          <div className="card p-6 mb-6">
            <h2 className="text-lg font-bold mb-4">{title}</h2>
            <div className="space-y-1">
              {entries.map(([key, val]) => (
                <details key={key} open={defaultOpen}>
                  <summary className="cursor-pointer py-2 px-3 rounded font-mono text-sm font-bold hover:opacity-80"
                    style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                  >
                    {key}
                    {(typeof val !== 'object' || val === null) && (
                      <span className="ml-3 font-normal text-xs" style={{color: 'var(--text-secondary)'}}>
                        {String(val).length > 60 ? String(val).substring(0, 60) + '...' : ''}
                      </span>
                    )}
                  </summary>
                  <div className="mt-1 ml-1">
                    <CodeValue value={val} />
                  </div>
                </details>
              ))}
            </div>
          </div>
        );
      };

      const DescField = ({ label, children, mono }) => (
        <div className="flex py-1.5 border-b border-gray-100 last:border-b-0">
          <div className="w-48 flex-shrink-0 text-sm text-gray-500 font-medium">{label}:</div>
          <div className={`flex-1 text-sm ${mono ? 'font-mono text-xs' : ''}`}>{children}</div>
        </div>
      );

      return (
        <div className="main-content p-8">
          <button
            onClick={() => navigate(`/bundle/${bundleId}/cluster-resources`)}
            className="text-brand-600 hover:text-brand-700 mb-4 flex items-center gap-1"
          >
            <Icon name="chevronLeft" size={18} />
            Back to Cluster Resources
          </button>

          <h1 className="text-3xl font-bold mb-8">{cleanMeta.name || name}</h1>

          {/* 1. Metadata */}
          <div className="card p-6 mb-6">
            <h2 className="text-lg font-bold mb-4">Metadata</h2>
            <div className="space-y-3">
              <DescField label="Name">{cleanMeta.name}</DescField>
              {cleanMeta.namespace && <DescField label="Namespace">{cleanMeta.namespace}</DescField>}
              {cleanMeta.uid && <DescField label="UID" mono>{cleanMeta.uid}</DescField>}
              {cleanMeta.resourceVersion && <DescField label="Resource Version">{cleanMeta.resourceVersion}</DescField>}
              {cleanMeta.creationTimestamp && (
                <DescField label="Created">
                  {new Date(cleanMeta.creationTimestamp).toLocaleString()}
                </DescField>
              )}
              {cleanMeta.labels && Object.keys(cleanMeta.labels).length > 0 && (
                <DescField label="Labels">
                  <div className="flex flex-wrap gap-1">
                    {Object.entries(cleanMeta.labels).map(([k, v]) => (
                      <span key={k} className="px-2 py-0.5 bg-brand-50 text-brand-800 rounded text-xs font-mono">
                        {k}={v}
                      </span>
                    ))}
                  </div>
                </DescField>
              )}
            </div>
          </div>

          {/* 2. Annotations */}
          {annotationEntries.length > 0 && (
            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">Annotations</h2>
              <div className="space-y-1">
                {annotationEntries.map(([key, val]) => {
                  let displayVal = val;
                  try {
                    if (typeof val === 'string' && (val.trim().startsWith('{') || val.trim().startsWith('['))) {
                      displayVal = JSON.parse(val);
                    }
                  } catch(e) {}
                  return (
                    <details key={key} open>
                      <summary className="cursor-pointer py-2 px-3 rounded font-mono text-sm font-bold hover:opacity-80"
                        style={{backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-primary)'}}
                      >{key}</summary>
                      <div className="mt-1 ml-1">
                        <CodeValue value={displayVal} />
                      </div>
                    </details>
                  );
                })}
              </div>
            </div>
          )}

          {/* 3. Status */}
          <KVSection title="Status" data={status} defaultOpen={true} />

          {/* 4. Specification */}
          <KVSection title="Specification" data={spec} defaultOpen={true} />

          {/* 4.5 StorageClass Properties */}
          {type === 'storageclasses' && (
            <div className="card p-6 mb-6">
              <h2 className="text-lg font-bold mb-4">Properties</h2>
              <div className="space-y-3">
                {(resource.provisioner || resource._provisioner) && <DescField label="Provisioner">{resource.provisioner || resource._provisioner}</DescField>}
                {(resource.reclaimPolicy || resource._reclaimPolicy) && <DescField label="Reclaim Policy">{resource.reclaimPolicy || resource._reclaimPolicy}</DescField>}
                {(resource.volumeBindingMode || resource._volumeBindingMode) && <DescField label="Volume Binding Mode">{resource.volumeBindingMode || resource._volumeBindingMode}</DescField>}
                {(resource.allowVolumeExpansion !== undefined || resource._allowVolumeExpansion !== undefined) && (
                  <DescField label="Allow Volume Expansion">
                    {(resource.allowVolumeExpansion !== undefined ? resource.allowVolumeExpansion : resource._allowVolumeExpansion) ? 'Yes' : 'No'}
                  </DescField>
                )}
                {((resource.parameters && Object.keys(resource.parameters).length > 0) || (resource._parameters && Object.keys(resource._parameters).length > 0)) && (
                  <DescField label="Parameters">
                    <div className="space-y-1 font-mono text-sm">
                      {Object.entries(resource.parameters || resource._parameters || {}).map(([key, val]) => (
                        <div key={key}>
                          <span style={{color: 'var(--text-secondary)'}}>{key}:</span> <span className="text-brand-700">{val}</span>
                        </div>
                      ))}
                    </div>
                  </DescField>
                )}
              </div>
            </div>
          )}

          {/* 5. Raw Output section */}
          <div className="card p-6">
            <details>
              <summary className="text-lg font-bold cursor-pointer hover:opacity-80">Raw Output</summary>
              <div className="mt-3">
                <div className="flex gap-1 bg-gray-100 rounded p-1 mb-3" style={{display: 'inline-flex'}}>
                  <button onClick={() => setRawViewMode('json')}
                    className={`px-3 py-1 rounded text-sm ${rawViewMode === 'json' ? 'bg-white shadow text-brand-700 font-semibold' : 'text-gray-600'}`}
                  >JSON</button>
                  <button onClick={() => setRawViewMode('describe')}
                    className={`px-3 py-1 rounded text-sm ${rawViewMode === 'describe' ? 'bg-white shadow text-brand-700 font-semibold' : 'text-gray-600'}`}
                  >Describe</button>
                </div>
                {rawViewMode === 'json' ? (
                  <CodeValue value={cleanResource} />
                ) : (
                  <DescribeView data={cleanResource} />
                )}
              </div>
            </details>
          </div>
        </div>
      );
    }

    // Layout wrapper - provides sidebar + main content area
    function BundleLayout({ children }) {
      const { bundleId } = useParams();
      return (
        <>
          <Sidebar bundleId={bundleId} />
          {children}
        </>
      );
    }

    function WithLayout({ Page }) { return <BundleLayout><Page /></BundleLayout>; }

    // Main App Component
    function App() {
      return (
        <Routes>
          <Route path="/" element={<BundleListPage />} />
          <Route path="/bundle/:bundleId" element={<WithLayout Page={DashboardPage} />} />
          <Route path="/bundle/:bundleId/gemini-review" element={<WithLayout Page={GeminiReviewPage} />} />
          <Route path="/bundle/:bundleId/ns/:ns/:type" element={<WithLayout Page={ResourceListPage} />} />
          <Route path="/bundle/:bundleId/ns/:ns/:type/:name" element={<WithLayout Page={ResourceDetailPage} />} />
          <Route path="/bundle/:bundleId/events" element={<WithLayout Page={EventsPage} />} />
          <Route path="/bundle/:bundleId/logs" element={<WithLayout Page={LogsPage} />} />
          <Route path="/bundle/:bundleId/graph" element={<WithLayout Page={GraphPage} />} />
          <Route path="/bundle/:bundleId/diagnostics" element={<WithLayout Page={DiagnosticsPage} />} />
          <Route path="/bundle/:bundleId/cluster-resources" element={<WithLayout Page={ClusterResourcesPage} />} />
          <Route path="/bundle/:bundleId/cluster-resources/:type/:name" element={<WithLayout Page={ClusterResourceDetailPage} />} />
          <Route path="*" element={<Navigate to="/" />} />
        </Routes>
      );
    }

    // Root Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ThemeProvider>
        <ErrorBoundary>
          <BrowserRouter>
            <App />
            <ThemeToggle />
          </BrowserRouter>
        </ErrorBoundary>
      </ThemeProvider>
    );
  </script>
</body>
</html>
